appId: com.techclip.app
---
# ホーム画面 E2E テスト
# 記事一覧の表示とフィルター操作を検証する
# 前提: ログイン済みの状態で実行する

- launchApp

# ホーム画面のフィルターバーが表示されることを確認する
- assertVisible: "すべて"
- assertVisible: "Zenn"
- assertVisible: "Qiita"

# お気に入りフィルターが表示されることを確認する
- assertVisible: "お気に入り"

# Zennフィルターをタップする
- tapOn: "Zenn"

# すべてに戻す
- tapOn: "すべて"
