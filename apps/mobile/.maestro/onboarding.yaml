appId: com.techclip.app
---
# オンボーディングフロー E2E テスト
# 初回起動時の4ページウォークスルーを検証する

- launchApp:
    clearState: true

# ページ1: 技術記事をワンタップで保存
- assertVisible:
    id: "onboarding-title"
- assertVisible: "技術記事をワンタップで保存"
- assertVisible:
    id: "page-indicator"
- assertVisible:
    id: "skip-button"
- assertVisible:
    id: "next-button"

# ページ2へ進む
- tapOn:
    id: "next-button"
- assertVisible: "AIが要約・翻訳"

# ページ3へ進む
- tapOn:
    id: "next-button"
- assertVisible: "お気に入り・タグで整理"

# ページ4（最終ページ）へ進む
- tapOn:
    id: "next-button"
- assertVisible: "さあ、始めましょう"
- assertVisible:
    id: "finish-button"

# 「始める」をタップしてログイン画面へ
- tapOn:
    id: "finish-button"
- assertVisible:
    id: "login-submit-button"
