name = "tech-clip-api"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
R2_PUBLIC_URL = "http://localhost:8787/avatars"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "113f55fe5de04673a2585e146b1520cc"

[[kv_namespaces]]
binding = "CACHE"
id = "d8dd77ff2e0a4ee69e0d780657b02473"

[[r2_buckets]]
binding = "AVATARS_BUCKET"
bucket_name = "tech-clip-avatars"

# [ai] binding は省略: CI では Workers AI を使わないため。
# wrangler 4.x の [ai] binding は edge-preview remote proxy session を必要とし、
# ダミー認証情報では起動に失敗する。

[triggers]
crons = ["0 0 1 * *"]
