name = "tech-clip-api"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
R2_PUBLIC_URL = "http://localhost:8787/avatars"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "113f55fe5de04673a2585e146b1520cc"

[[kv_namespaces]]
binding = "CACHE"
id = "d8dd77ff2e0a4ee69e0d780657b02473"

[[r2_buckets]]
binding = "AVATARS_BUCKET"
bucket_name = "tech-clip-avatars"

[ai]
binding = "AI"

# [secrets]
# TURSO_DATABASE_URL
# TURSO_AUTH_TOKEN
# TRUSTED_ORIGINS     # カンマ区切りの追加 trustedOrigins（例: "https://staging.example.com,https://dev.example.com"）
# SENTRY_DSN          # Sentry エラー監視用 DSN（例: https://<key>@oXXXXXX.ingest.sentry.io/<project_id>）
# GITHUB_WEBHOOK_SECRET  # GitHub Webhook HMAC-SHA256 シークレット（wrangler secret put GITHUB_WEBHOOK_SECRET）
# GITHUB_TOKEN        # GitHub API アクセストークン（verdict 判定用、wrangler secret put GITHUB_TOKEN）

[triggers]
crons = ["0 0 1 * *"]

# --- Staging 環境 ---
# TODO(staging-setup): Staging 環境はまだ構築されていません。
#   追跡 Issue: (フォローアップ Issue を作成してここに番号を追記すること)
#   ブロッカー: KV namespace / R2 bucket の事前作成が必要。
#
#   デプロイ手順:
#   1. wrangler kv namespace create tech-clip-rate-limit-staging --env staging
#   2. wrangler kv namespace create tech-clip-cache-staging --env staging
#   3. Cloudflare ダッシュボードで R2 bucket "tech-clip-avatars-staging" を作成
#   4. 各 ID を取得して REPLACE_WITH_... を実値に置換する
#   5. wrangler secret put TURSO_DATABASE_URL --env staging（他 secrets も同様）
#
#   注意: REPLACE_WITH_... が残った状態で `wrangler deploy --env staging` を実行すると
#         Cloudflare API から設定エラーが返る想定。production デプロイでは
#         env.staging セクションは参照されないため本番環境は安全。
#
#   staging でも monthly cron を動かしたい場合:
#     [env.staging.triggers]
#     crons = ["0 0 1 * *"]
[env.staging]
name = "tech-clip-api-staging"
[env.staging.vars]
ENVIRONMENT = "staging"
APP_URL = "REPLACE_WITH_STAGING_APP_URL"
R2_PUBLIC_URL = "REPLACE_WITH_STAGING_R2_PUBLIC_URL"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_STAGING_RATE_LIMIT_KV_ID"

[[env.staging.kv_namespaces]]
binding = "CACHE"
id = "REPLACE_WITH_STAGING_CACHE_KV_ID"

[[env.staging.r2_buckets]]
binding = "AVATARS_BUCKET"
bucket_name = "tech-clip-avatars-staging"

[env.staging.ai]
binding = "AI"

# --- 本番環境 ---
[env.production]
name = "tech-clip-api-production"
[env.production.vars]
ENVIRONMENT = "production"
APP_URL = "https://techclip.app"
R2_PUBLIC_URL = "https://avatars.techclip.io"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT"
id = "038ee79509144038be5dbc7b8a2a7aeb"

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "e544672a356748d390c0da96f4341cf9"

[[env.production.r2_buckets]]
binding = "AVATARS_BUCKET"
bucket_name = "tech-clip-avatars-production"

[env.production.ai]
binding = "AI"

[[env.production.routes]]
pattern = "api.techclip.app"
custom_domain = true
