name = "tech-clip-api"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "113f55fe5de04673a2585e146b1520cc"

[[kv_namespaces]]
binding = "CACHE"
id = "d8dd77ff2e0a4ee69e0d780657b02473"

[[r2_buckets]]
binding = "AVATARS_BUCKET"
bucket_name = "tech-clip-avatars"

# 本番/ステージング環境では以下の secrets を wrangler secret put で設定すること
# （.dev.vars はローカル開発専用。本番には使用しない）
#
# 必須 secrets 一覧:
#   TURSO_DATABASE_URL         - Turso libSQL データベース接続 URL
#   TURSO_AUTH_TOKEN           - Turso 認証トークン
#   BETTER_AUTH_SECRET         - Better Auth セッション署名キー（32文字以上）
#   GOOGLE_CLIENT_ID           - Google OAuth クライアント ID
#   GOOGLE_CLIENT_SECRET       - Google OAuth クライアントシークレット
#   APPLE_CLIENT_ID            - Apple Sign In サービス ID
#   APPLE_CLIENT_SECRET        - Apple Sign In JWT（6ヶ月ごとに更新）
#   GITHUB_CLIENT_ID           - GitHub OAuth クライアント ID
#   GITHUB_CLIENT_SECRET       - GitHub OAuth クライアントシークレット
#   RUNPOD_API_KEY             - RunPod API キー（AI 推論）
#   RUNPOD_ENDPOINT_ID         - RunPod サーバーレスエンドポイント ID
#   REVENUECAT_WEBHOOK_SECRET  - RevenueCat Webhook 署名検証シークレット
#   RESEND_API_KEY             - Resend メール送信 API キー
#
# 設定コマンド例（本番環境）:
#   wrangler secret put TURSO_DATABASE_URL --env production
#
# 詳細手順: docs/SECRETS.md を参照

[triggers]
crons = ["0 0 1 * *"]

# --- ステージング環境 ---
[env.staging]
name = "tech-clip-api-staging"
[env.staging.vars]
ENVIRONMENT = "staging"
APP_URL = "https://techclip.app"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT"
id = "3a87ba694ddb4816b386db8d564e5155"

[[env.staging.kv_namespaces]]
binding = "CACHE"
id = "39563996c207443882fba0340915f0cf"

[[env.staging.r2_buckets]]
binding = "AVATARS_BUCKET"
bucket_name = "tech-clip-avatars-staging"

# --- 本番環境 ---
[env.production]
name = "tech-clip-api-production"
[env.production.vars]
ENVIRONMENT = "production"
APP_URL = "https://techclip.app"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT"
id = "038ee79509144038be5dbc7b8a2a7aeb"

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "e544672a356748d390c0da96f4341cf9"

[[env.production.r2_buckets]]
binding = "AVATARS_BUCKET"
bucket_name = "tech-clip-avatars-production"

[[env.production.routes]]
pattern = "api.techclip.app"
custom_domain = true
