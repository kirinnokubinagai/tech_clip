name = "tech-clip-api"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "113f55fe5de04673a2585e146b1520cc"

[[kv_namespaces]]
binding = "CACHE"
id = "d8dd77ff2e0a4ee69e0d780657b02473"

[[r2_buckets]]
binding = "AVATARS_BUCKET"
bucket_name = "tech-clip-avatars"

# [secrets]
# TURSO_DATABASE_URL
# TURSO_AUTH_TOKEN
# RUNPOD_API_KEY
# RUNPOD_ENDPOINT_ID

[triggers]
crons = ["0 0 1 * *"]

# --- ステージング環境 ---
[env.staging]
name = "tech-clip-api-staging"
[env.staging.vars]
ENVIRONMENT = "staging"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT"
id = "113f55fe5de04673a2585e146b1520cc"

[[env.staging.kv_namespaces]]
binding = "CACHE"
id = "d8dd77ff2e0a4ee69e0d780657b02473"

[[env.staging.r2_buckets]]
binding = "AVATARS_BUCKET"
bucket_name = "tech-clip-avatars"

# --- 本番環境 ---
[env.production]
name = "tech-clip-api-production"
[env.production.vars]
ENVIRONMENT = "production"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT"
id = "113f55fe5de04673a2585e146b1520cc"

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "d8dd77ff2e0a4ee69e0d780657b02473"

[[env.production.r2_buckets]]
binding = "AVATARS_BUCKET"
bucket_name = "tech-clip-avatars"

[[env.production.routes]]
pattern = "api.techclip.app"
custom_domain = true
