name: Deploy RunPod

on:
  push:
    branches: [main]
    paths:
      - infra/runpod/**

jobs:
  deploy-runpod:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker registry
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            "${{ secrets.DOCKER_REGISTRY_URL }}" \
            --username "${{ secrets.DOCKER_USERNAME }}" \
            --password-stdin
      - name: Build and push Docker image
        run: |
          IMAGE_TAG="${{ secrets.DOCKER_REGISTRY_URL }}/tech-clip-inference:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" infra/runpod/
          docker push "$IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
      - name: Update RunPod endpoint
        run: |
          HTTP_CODE=$(curl -s -o /tmp/runpod-response.json -w '%{http_code}' -X PATCH \
            "https://api.runpod.io/v2/endpoint/${{ secrets.RUNPOD_ENDPOINT_ID }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RUNPOD_API_KEY }}" \
            -d "{\"imageName\": \"$IMAGE_TAG\"}")
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "RunPod API エラー (HTTP $HTTP_CODE):"
            cat /tmp/runpod-response.json
            exit 1
          fi
          cat /tmp/runpod-response.json
