name: Deploy RunPod

on:
  push:
    branches: [main]
    paths:
      - infra/runpod/**

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-runpod:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker registry
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            "${{ secrets.DOCKER_REGISTRY_URL }}" \
            --username "${{ secrets.DOCKER_USERNAME }}" \
            --password-stdin
      - name: Build and push Docker image
        run: |
          IMAGE_TAG="${{ secrets.DOCKER_REGISTRY_URL }}/tech-clip-inference:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" infra/runpod/
          PUSH_OUTPUT=$(docker push "$IMAGE_TAG")
          DIGEST=$(echo "$PUSH_OUTPUT" | grep -o 'sha256:[a-f0-9]\{64\}' | tail -1)
          if [ -z "$DIGEST" ]; then
            echo "docker pushのdigest検証に失敗しました"
            exit 1
          fi
          echo "Pushed image digest: $DIGEST"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "IMAGE_DIGEST=$DIGEST" >> "$GITHUB_ENV"
      - name: Update RunPod endpoint
        run: |
          response_file="$(mktemp)"
          trap 'rm -f "$response_file"' EXIT

          HTTP_CODE=$(curl -s -o "$response_file" -w '%{http_code}' -X PATCH \
            "https://api.runpod.io/v2/endpoint/${{ secrets.RUNPOD_ENDPOINT_ID }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RUNPOD_API_KEY }}" \
            -d "{\"imageName\": \"$IMAGE_TAG\"}")
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "RunPod API エラー (HTTP $HTTP_CODE):"
            cat "$response_file"
            exit 1
          fi
          cat "$response_file"
