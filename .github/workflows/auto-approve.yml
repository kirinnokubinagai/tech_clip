name: Claude Review & Auto Approve

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Read,Grep,Glob"
          prompt: |
            このPRの差分を以下の基準でレビューし、結果を日本語でPRコメントに投稿してください。

            ## コードレビュー基準

            ### 1. 正確性
            - ロジックは正しいか
            - エッジケースは考慮されているか
            - エラーハンドリングは適切か

            ### 2. コーディング規約
            - 命名規則に従っているか
            - 禁止パターン（any型、else文、console.log）を使っていないか
            - 早期リターンを使っているか
            - JSDocコメントがあるか

            ### 3. セキュリティ
            - ハードコードされた機密情報がないか
            - SQLインジェクション対策（ORM使用）
            - XSS対策（エスケープ処理）
            - 認証・認可チェックがあるか

            ### 4. パフォーマンス
            - N+1クエリがないか
            - 不要な再計算がないか

            ### 5. テスト
            - テストカバレッジは80%以上か
            - 正常系・異常系・境界値がテストされているか
            - テスト名は日本語で意図が明確か

            ## PRレビュー基準

            ### 1. PR概要
            - タイトルがConventional Commitsに従っているか
            - 説明にIssue番号（Closes #XXX）があるか
            - 1つのPRで1つの関心事か

            ### 2. 変更範囲
            - 変更ファイル数は適切か
            - 関係ない変更が混入していないか

            ## 出力フォーマット

            ### サマリー
            - 全体評価: ⭐ (1-5)
            - 重大な問題: X件
            - 軽微な問題: Y件

            ### 重大な問題 🔴
            | ファイル | 行 | 問題 | 修正案 |

            ### 軽微な問題 🟡
            | ファイル | 行 | 問題 | 修正案 |

            ### 判定
            - ✅ Approve: 重大な問題がない場合
            - 🔄 Request Changes: セキュリティ脆弱性、バグ、テスト不足がある場合

  approve:
    needs: [review]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ steps.app-token.outputs.token }}
