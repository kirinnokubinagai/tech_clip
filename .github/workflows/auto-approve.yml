name: Claude Review & Auto Approve

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review-and-approve:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--allowedTools Skill Read Grep Glob 'Bash(gh pr review:*)'"
          prompt: |
            このPRの差分をレビューしてください。
            レビューには必ず .claude/skills/review/code-review/SKILL.md と .claude/skills/review/pr-review/SKILL.md を Read ツールで読み取り、記載されたチェックリストと出力フォーマットに厳密に従ってください。
            結果は日本語でPRコメントに投稿してください。
            重大な問題（🔴）が0件の場合、gh pr review --approve を実行してApproveしてください。
            重大な問題がある場合はApproveせず、問題点をコメントしてください。
