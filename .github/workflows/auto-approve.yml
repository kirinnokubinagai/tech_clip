name: Claude Review & Label

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  review-and-label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools Skill,Read,Grep,Glob,"Bash(gh pr comment:*)","Bash(gh pr edit:*)"
          prompt: |
            このPRの差分をレビューしてください。
            レビューには必ず .claude/skills/review/code-review/SKILL.md と .claude/skills/review/pr-review/SKILL.md を Read ツールで読み取り、記載されたチェックリストと出力フォーマットに厳密に従ってください。
            結果は日本語でPRコメントに投稿してください。
            改善提案（💡）が1件でもある場合は、Approve / Approve相当 / マージ可能 という判定や表現を出してはいけません。

            レビュー完了後、以下のルールに従いラベルを操作してください（gh pr edit コマンドを使用）。
            - 重大な問題（🔴）が0件かつ軽微な問題（🟡）が0件かつ改善提案（💡）が0件の場合:
              gh pr edit ${{ github.event.pull_request.number }} --add-label "AI Review: PASS" --remove-label "AI Review: NEEDS WORK"
            - 1つでも問題や改善提案がある場合:
              gh pr edit ${{ github.event.pull_request.number }} --add-label "AI Review: NEEDS WORK" --remove-label "AI Review: PASS"

            重要: gh pr review --approve は絶対に実行しないでください。最終承認は人間が行います。

  review-gate:
    name: Review Gate
    needs: review-and-label
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      actions: write
    steps:
      - name: Check review label
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LABELS=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }} --jq '.labels[].name')
          if echo "$LABELS" | grep -q "AI Review: NEEDS WORK"; then
            echo "::error::AIレビューで問題または改善提案があります。修正してください。"

            echo "他の実行中ワークフローをキャンセル中..."
            gh api repos/${{ github.repository }}/actions/runs \
              --jq '.workflow_runs[] | select(.head_sha == "${{ github.event.pull_request.head.sha }}" and .status == "in_progress" and .id != ${{ github.run_id }}) | .id' \
              | while read -r RUN_ID; do
                  gh run cancel "${RUN_ID}" 2>/dev/null || true
                done

            exit 1
          fi
          echo "AIレビュー: PASS"
