name: PR E2E (Android)

on:
  pull_request:
    # gate-rules.json の ci_path_filters.e2e_android と同期させること
    paths:
      - "apps/mobile/**"
      - "tests/e2e/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/pr-e2e-android.yml"
      - ".github/actions/upload-pr-e2e-comment/**"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-e2e-android-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  android-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      # 1 件 fail しても他 shard を走らせて全体結果を取得する
      fail-fast: false
      matrix:
        # シャード数を増やすと wall-clock が短縮されるが runner 時間は増える。
        # 18 flow を 2 shard で約半減を狙う。要なら 3-4 shard に拡張可能。
        shard: [1, 2]
    env:
      SHARD_INDEX: ${{ matrix.shard }}
      SHARD_TOTAL: 2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.2.2

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /usr/local/share/boost
          sudo apt-get clean
          df -h

      - name: Gradle build cache
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf  # v4.2.2
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/mobile/android/.gradle
          key: gradle-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Generate dummy OTA code signing cert for CI
        run: |
          if [ ! -f apps/mobile/certs/certificate.pem ]; then
            mkdir -p apps/mobile/certs
            openssl req -x509 -newkey rsa:2048 -nodes \
              -keyout /tmp/ci-key.pem -out apps/mobile/certs/certificate.pem \
              -days 1 -subj "/CN=ci-dummy"
            echo "Generated dummy certificate for CI"
          fi

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: ./.github/actions/nix-setup

      - name: AVD cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api34-x86_64-google_apis-v1

      - name: Generate AVD snapshot (cache miss)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@1dcd0090116d15e7c562f8db72807de5e036a4ed  # v2.13.0
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "AVD snapshot generated"


      - name: Start Turso dev server
        run: nix develop --command bash scripts/ci/start-turso.sh
        env:
          TURSO_CI_DB_FILE: /tmp/tech-clip-ci-turso.db
          TURSO_CI_PORT: "8888"

      - name: Android Emulator + Maestro
        uses: reactivecircus/android-emulator-runner@324029e2f414c084d8b15ba075288885e74aef9c  # v2.13.0
        env:
          # NODE_OPTIONS は scripts/ci/run-android-e2e.sh 内で必要に応じて設定する
          # (action-runner の node20 が --no-experimental-strip-types を受け入れないため)
          TURSO_DATABASE_URL: "http://127.0.0.1:8888"
          TURSO_AUTH_TOKEN: "dummy"
          IS_E2E_ENV: "1"
          TEST_EMAIL: "test+maestro@techclip.app"
          # seed-maestro-static.ts の MAESTRO_STATIC_PASSWORD と統一。CI secret 不要
          TEST_PASSWORD: "TestPassword123!"
          TEST_NAME: "Maestro Test User"
          MAESTRO_TEST_PASSWORD: "TestPassword123!"
          TIMESTAMP: ${{ github.run_id }}
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: bash scripts/ci/run-android-e2e.sh

      - name: Upload screenshots artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4.6.2
        with:
          name: pr-e2e-screenshots-shard${{ matrix.shard }}
          path: screenshots/**/*.png
          retention-days: 7
          if-no-files-found: warn

      - name: Upload JUnit artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4.6.2
        with:
          name: pr-e2e-junit-shard${{ matrix.shard }}
          path: |
            test-results/junit-shard${{ matrix.shard }}of2.xml
            test-results/maestro-exit-code-shard${{ matrix.shard }}of2.txt
          retention-days: 7
          if-no-files-found: warn

      - name: Fail if Maestro failed
        if: always()
        run: |
          set -eo pipefail
          EXIT_CODE=$(cat "test-results/maestro-exit-code-shard${{ matrix.shard }}of2.txt" 2>/dev/null || echo 1)
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "Maestro tests failed (shard ${{ matrix.shard }}/2) with exit code $EXIT_CODE"
            exit 1
          fi

  e2e-aggregate:
    needs: android-e2e
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.2.2

      - name: Download all shard artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          pattern: pr-e2e-junit-shard*
          merge-multiple: true
          path: test-results

      - name: Download all screenshot artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          pattern: pr-e2e-screenshots-shard*
          merge-multiple: true
          path: screenshots

      - name: Aggregate junit results
        id: aggregate
        run: |
          set -eo pipefail
          mkdir -p test-results
          # 全 shard の junit を 1 ファイルに連結 (upload-pr-e2e-comment 互換のため)
          # 簡易的に最初に見つかった file を junit.xml に複製し、合計値を計算
          SHARD_FILES=$(ls test-results/junit-shard*of2.xml 2>/dev/null || true)
          if [ -z "$SHARD_FILES" ]; then
            echo "no shard junit files found" >&2
            echo "1" > test-results/maestro-exit-code.txt
            exit 1
          fi
          TOTAL=0
          FAILED=0
          ERRORS=0
          for f in $SHARD_FILES; do
            t=$(grep -oE 'tests="[0-9]+"' "$f" | head -1 | grep -oE '[0-9]+' || echo 0)
            fa=$(grep -oE 'failures="[0-9]+"' "$f" | head -1 | grep -oE '[0-9]+' || echo 0)
            er=$(grep -oE 'errors="[0-9]+"' "$f" | head -1 | grep -oE '[0-9]+' || echo 0)
            TOTAL=$((TOTAL + t))
            FAILED=$((FAILED + fa))
            ERRORS=$((ERRORS + er))
          done
          echo "Aggregate: tests=$TOTAL failures=$FAILED errors=$ERRORS"
          # 集約 junit.xml を生成 (testsuite を 1 つにまとめる)
          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo "<testsuite tests=\"$TOTAL\" failures=\"$FAILED\" errors=\"$ERRORS\">"
            for f in $SHARD_FILES; do
              # testsuite の中身 (testcase 等) のみを抽出して連結
              sed -n '/<testcase/,/<\/testcase>/p' "$f" || true
            done
            echo '</testsuite>'
          } > test-results/junit.xml

          # exit code: 全 shard が 0 (all pass) でなければ 1
          OVERALL=0
          for f in $(ls test-results/maestro-exit-code-shard*of2.txt 2>/dev/null); do
            EC=$(cat "$f" 2>/dev/null || echo 1)
            if [ "$EC" -ne 0 ]; then
              OVERALL=$EC
            fi
          done
          echo "$OVERALL" > test-results/maestro-exit-code.txt

      - name: Upload aggregated screenshots & junit
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4.6.2
        with:
          name: pr-e2e-aggregated
          path: |
            test-results/junit.xml
            test-results/maestro-exit-code.txt
          retention-days: 7
          if-no-files-found: warn

      - name: Upload screenshots to Release and comment on PR
        if: always()
        uses: ./.github/actions/upload-pr-e2e-comment
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ github.event.pull_request.number }}
          run-id: ${{ github.run_id }}
          screenshots-dir: screenshots
          junit-path: test-results/junit.xml

      - name: Fail if any shard failed
        if: always()
        run: |
          set -eo pipefail
          EXIT_CODE=$(cat test-results/maestro-exit-code.txt 2>/dev/null || echo 1)
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "Aggregated Maestro tests failed with exit code $EXIT_CODE"
            exit 1
          fi
