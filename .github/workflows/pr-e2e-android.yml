name: PR E2E (Android)

on:
  pull_request:
    branches: [main, stage]
    # gate-rules.json の ci_path_filters.e2e_android と同期させること
    paths:
      - "apps/mobile/**"
      - "tests/e2e/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/pr-e2e-android.yml"
      - ".github/actions/upload-pr-e2e-comment/**"
      - "scripts/ci/**"
      - "scripts/dev/setup-avd.sh"
      - "scripts/dev/launch-shard-emulators.sh"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-e2e-android-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  android-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      # 1 件 fail しても他 shard を走らせて全体結果を取得する
      fail-fast: false
      matrix:
        # 18 flow を 2 shard で並列実行 (要なら 3-4 に拡張可能)
        shard: [1, 2]
    env:
      SHARD_INDEX: ${{ matrix.shard }}
      SHARD_TOTAL: 2
      # nix が ANDROID_HOME を提供するので暫定: nix shell 経由で実行する
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.2.2

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be  # v1.3.1
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Gradle build cache
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf  # v4.2.2
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/mobile/android/.gradle
          key: gradle-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Generate dummy OTA code signing cert for CI
        run: |
          if [ ! -f apps/mobile/certs/certificate.pem ]; then
            mkdir -p apps/mobile/certs
            openssl req -x509 -newkey rsa:2048 -nodes \
              -keyout /tmp/ci-key.pem -out apps/mobile/certs/certificate.pem \
              -days 1 -subj "/CN=ci-dummy"
            echo "Generated dummy certificate for CI"
          fi

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: ./.github/actions/nix-setup

      - name: nix Android SDK cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.android-nix
          key: nix-avd-${{ hashFiles('flake.lock', 'scripts/dev/setup-avd.sh') }}-v1

      - name: Start Turso dev server
        run: nix develop --command bash scripts/ci/start-turso.sh
        env:
          TURSO_CI_DB_FILE: /tmp/tech-clip-ci-turso.db
          TURSO_CI_PORT: "8888"

      - name: Boot Android emulator (nix-provided)
        run: nix develop --command bash scripts/ci/start-emulator.sh techclip-ci 5554

      - name: Run E2E (shard ${{ matrix.shard }}/2)
        env:
          TURSO_DATABASE_URL: "http://127.0.0.1:8888"
          TURSO_AUTH_TOKEN: "dummy"
          IS_E2E_ENV: "1"
          TEST_EMAIL: "test+maestro@techclip.app"
          TEST_PASSWORD: "TestPassword123!"
          TEST_NAME: "Maestro Test User"
          MAESTRO_TEST_PASSWORD: "TestPassword123!"
          TIMESTAMP: ${{ github.run_id }}
        run: nix develop --command bash scripts/ci/run-android-e2e.sh

      - name: Stop emulator
        if: always()
        run: |
          if [ -f /tmp/emulator-5554.pid ]; then
            PID=$(cat /tmp/emulator-5554.pid)
            kill "$PID" 2>/dev/null || true
          fi
          nix develop --command adb -s emulator-5554 emu kill 2>/dev/null || true

      - name: Upload screenshots artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4.6.2
        with:
          name: pr-e2e-screenshots-shard${{ matrix.shard }}
          path: screenshots/**/*.png
          retention-days: 7
          if-no-files-found: warn

      - name: Upload JUnit artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4.6.2
        with:
          name: pr-e2e-junit-shard${{ matrix.shard }}
          path: |
            test-results/junit-shard${{ matrix.shard }}of2.xml
            test-results/maestro-exit-code-shard${{ matrix.shard }}of2.txt
          retention-days: 7
          if-no-files-found: warn

      - name: Fail if Maestro failed
        if: always()
        run: |
          set -eo pipefail
          JUNIT="test-results/junit-shard${{ matrix.shard }}of2.xml"
          EXIT_CODE_FILE="test-results/maestro-exit-code-shard${{ matrix.shard }}of2.txt"

          if [ ! -f "$EXIT_CODE_FILE" ]; then
            echo "::error::maestro-exit-code file not found: $EXIT_CODE_FILE"
            exit 1
          fi
          EXIT_CODE=$(cat "$EXIT_CODE_FILE")

          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::Maestro E2E failed (shard ${{ matrix.shard }}/2)"

            if [ ! -f "$JUNIT" ]; then
              echo "::error::JUnit XML not found: $JUNIT"
              exit 1
            fi
            if [ ! -s "$JUNIT" ]; then
              echo "::error::JUnit XML is empty: $JUNIT"
              exit 1
            fi

            echo ""
            echo "=== Failed tests ==="
            python3 -c "
          import xml.etree.ElementTree as ET, sys
          tree = ET.parse('$JUNIT')
          for tc in tree.iter('testcase'):
              fail = tc.find('failure')
              if fail is not None:
                  name = tc.get('name', 'unknown')
                  msg = fail.text or fail.get('message', '(no message)')
                  print(f'::error::FAIL: {name} — {msg}')
                  print(f'  Test: {name}')
                  print(f'  Reason: {msg}')
                  print()
          " || {
              echo "::error::JUnit XML parse failed for $JUNIT"
              echo "--- Raw XML (first 50 lines) ---"
              head -50 "$JUNIT" || true
              exit 1
            }

            echo "=== Summary ==="
            python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('$JUNIT')
          ts = tree.find('.//testsuite') or tree.getroot()
          total = ts.get('tests', '?')
          fails = ts.get('failures', '?')
          print(f'Total: {total}, Failures: {fails}')
          " || {
              echo "::warning::JUnit summary parse failed (non-fatal)"
            }

            exit 1
          fi

  e2e-aggregate:
    needs: android-e2e
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.2.2

      - name: Download all shard artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          pattern: pr-e2e-junit-shard*
          merge-multiple: true
          path: test-results

      - name: Download all screenshot artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          pattern: pr-e2e-screenshots-shard*
          merge-multiple: true
          path: screenshots

      - name: Aggregate junit results
        id: aggregate
        run: |
          set -eo pipefail
          mkdir -p test-results
          SHARD_FILES=$(ls test-results/junit-shard*of2.xml 2>/dev/null || true)
          if [ -z "$SHARD_FILES" ]; then
            echo "no shard junit files found" >&2
            echo "1" > test-results/maestro-exit-code.txt
            exit 1
          fi
          TOTAL=0
          FAILED=0
          ERRORS=0
          for f in $SHARD_FILES; do
            t=$(grep -oE 'tests="[0-9]+"' "$f" | head -1 | grep -oE '[0-9]+' || echo 0)
            fa=$(grep -oE 'failures="[0-9]+"' "$f" | head -1 | grep -oE '[0-9]+' || echo 0)
            er=$(grep -oE 'errors="[0-9]+"' "$f" | head -1 | grep -oE '[0-9]+' || echo 0)
            TOTAL=$((TOTAL + t))
            FAILED=$((FAILED + fa))
            ERRORS=$((ERRORS + er))
          done
          echo "Aggregate: tests=$TOTAL failures=$FAILED errors=$ERRORS"
          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo "<testsuite tests=\"$TOTAL\" failures=\"$FAILED\" errors=\"$ERRORS\">"
            for f in $SHARD_FILES; do
              sed -n '/<testcase/,/<\/testcase>/p' "$f" || true
            done
            echo '</testsuite>'
          } > test-results/junit.xml

          OVERALL=0
          for f in $(ls test-results/maestro-exit-code-shard*of2.txt 2>/dev/null); do
            EC=$(cat "$f" 2>/dev/null || echo 1)
            if [ "$EC" -ne 0 ]; then
              OVERALL=$EC
            fi
          done
          echo "$OVERALL" > test-results/maestro-exit-code.txt

      - name: Upload aggregated screenshots & junit
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4.6.2
        with:
          name: pr-e2e-aggregated
          path: |
            test-results/junit.xml
            test-results/maestro-exit-code.txt
          retention-days: 7
          if-no-files-found: warn

      - name: Upload screenshots to Release and comment on PR
        if: always()
        uses: ./.github/actions/upload-pr-e2e-comment
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ github.event.pull_request.number }}
          run-id: ${{ github.run_id }}
          screenshots-dir: screenshots
          junit-path: test-results/junit.xml

      - name: Fail if any shard failed
        if: always()
        run: |
          set -eo pipefail
          EXIT_CODE_FILE="test-results/maestro-exit-code.txt"

          if [ ! -f "$EXIT_CODE_FILE" ]; then
            echo "::error::Aggregated maestro-exit-code.txt not found — aggregate step likely failed"
            exit 1
          fi
          EXIT_CODE=$(cat "$EXIT_CODE_FILE")

          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::Maestro E2E failed (aggregated)"
            JUNIT="test-results/junit.xml"

            if [ ! -f "$JUNIT" ]; then
              echo "::error::Aggregated JUnit XML not found: $JUNIT"
              exit 1
            fi
            if [ ! -s "$JUNIT" ]; then
              echo "::error::Aggregated JUnit XML is empty: $JUNIT"
              exit 1
            fi

            echo ""
            echo "=== Failed tests (all shards) ==="
            python3 -c "
          import xml.etree.ElementTree as ET, sys
          tree = ET.parse('$JUNIT')
          for tc in tree.iter('testcase'):
              fail = tc.find('failure')
              if fail is not None:
                  name = tc.get('name', 'unknown')
                  msg = fail.text or fail.get('message', '(no message)')
                  print(f'::error::FAIL: {name} — {msg}')
                  print(f'  Test: {name}')
                  print(f'  Reason: {msg}')
                  print()
          " || {
              echo "::error::JUnit XML parse failed for $JUNIT"
              echo "--- Raw XML (first 50 lines) ---"
              head -50 "$JUNIT" || true
              exit 1
            }

            echo "=== Summary ==="
            python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('$JUNIT')
          ts = tree.find('.//testsuite') or tree.getroot()
          total = ts.get('tests', '?')
          fails = ts.get('failures', '?')
          print(f'Total: {total}, Failures: {fails}')
          " || {
              echo "::warning::JUnit summary parse failed (non-fatal)"
            }

            exit 1
          fi
