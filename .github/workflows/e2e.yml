name: E2E Tests (Maestro)

on:
  workflow_run:
    workflows: [EAS Build]
    types: [completed]
    branches: [main]

jobs:
  maestro-e2e:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/nix-setup
      - uses: expo/expo-github-action@v8
        with:
          eas-version: "14.x"
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Run Maestro Cloud E2E tests
        run: |
          BUILD_LIST=$(nix develop --command eas build:list --platform ios --limit 1 --json --non-interactive)
          BUILD_URL=$(echo "$BUILD_LIST" | jq -r '.[0].artifacts.buildUrl // empty')
          if [ -z "$BUILD_URL" ]; then
            echo "EAS Buildのアーティファクトが見つかりません"
            exit 1
          fi
          nix develop --command maestro cloud \
            --apiKey "${{ secrets.MAESTRO_CLOUD_API_KEY }}" \
            --app-file "$BUILD_URL" \
            .maestro/
        working-directory: apps/mobile
