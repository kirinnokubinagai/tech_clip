name: E2E Tests (Maestro)

on:
  workflow_run:
    workflows: [EAS Build]
    types: [completed]
    branches: [main]

jobs:
  maestro-e2e:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
      - uses: cachix/cachix-action@v14
        with:
          name: devenv
        continue-on-error: true
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Install Maestro CLI
        run: curl -Ls "https://get.maestro.mobile.dev" | bash
      - name: Run Maestro Cloud E2E tests
        run: |
          export PATH="$HOME/.maestro/bin:$PATH"
          BUILD_URL=$(eas build:list --platform ios --limit 1 --json --non-interactive | jq -r '.[0].artifacts.buildUrl')
          if [ -z "$BUILD_URL" ] || [ "$BUILD_URL" = "null" ]; then
            echo "EAS Buildのアーティファクトが見つかりません"
            exit 1
          fi
          maestro cloud \
            --apiKey "${{ secrets.MAESTRO_CLOUD_API_KEY }}" \
            --app-file "$BUILD_URL" \
            .maestro/
        working-directory: apps/mobile
        env:
          MAESTRO_CLOUD_API_KEY: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
