name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/main'
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy API to staging
        working-directory: apps/api
        run: pnpm wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Health check (staging)
        run: |
          sleep 5
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://tech-clip-api-staging.workers.dev/api/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed: HTTP $STATUS"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 3 attempts"
          exit 1

  deploy-production:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy API to production
        working-directory: apps/api
        run: pnpm wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Health check (production)
        run: |
          sleep 5
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.techclip.app/api/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed: HTTP $STATUS"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 3 attempts"
          exit 1
