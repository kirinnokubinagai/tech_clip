name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# デフォルトで全権限を read-only にし、各ジョブで必要な権限のみを上書きする
permissions: read-all

jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/main'
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.2.2
      - uses: ./.github/actions/nix-setup
      - name: Mask secrets
        run: |
          echo "::add-mask::${{ secrets.CLOUDFLARE_API_TOKEN }}"
          echo "::add-mask::${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
      - name: Deploy API to staging
        working-directory: apps/api
        run: nix develop --command pnpm wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Health check (staging)
        run: |
          sleep 5
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://tech-clip-api-staging.workers.dev/api/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed: HTTP $STATUS"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 3 attempts"
          exit 1

  zap-scan-staging:
    if: github.ref == 'refs/heads/main'
    name: OWASP ZAP Scan (Staging)
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
    env:
      STAGING_API_URL: https://tech-clip-api-staging.workers.dev
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.2.2
      - name: Mask secrets
        run: |
          echo "::add-mask::${{ secrets.ZAP_TEST_EMAIL }}"
          echo "::add-mask::${{ secrets.ZAP_TEST_PASSWORD }}"
      - name: Register test user and obtain auth token (staging)
        id: auth
        run: |
          SIGNUP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$STAGING_API_URL/api/auth/sign-up/email" \
            -H 'Content-Type: application/json' \
            -d '{"email":"${{ secrets.ZAP_TEST_EMAIL }}","password":"${{ secrets.ZAP_TEST_PASSWORD }}","name":"ZAP Test User"}')
          echo "サインアップHTTPステータス: $SIGNUP_STATUS"
          RESPONSE=$(curl -s -X POST "$STAGING_API_URL/api/auth/sign-in" \
            -H 'Content-Type: application/json' \
            -d '{"email":"${{ secrets.ZAP_TEST_EMAIL }}","password":"${{ secrets.ZAP_TEST_PASSWORD }}"}')
          TOKEN=$(echo "$RESPONSE" | jq -r '.data.session.token // .data.token // .token // empty' 2>/dev/null || echo "")
          if [ -z "$TOKEN" ]; then
            echo "警告: 認証トークンを取得できませんでした。未認証スキャンのみ実施します"
            TOKEN="dummy-token-for-unauthenticated-scan"
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
      - name: OWASP ZAP API Scan (staging)
        uses: zaproxy/action-api-scan@5158fe4d9d8fcc75ea204db81317cce7f9e5453d  # v0.10.0
        env:
          ZAP_AUTH_HEADER: Authorization
          ZAP_AUTH_HEADER_VALUE: Bearer ${{ steps.auth.outputs.token }}
        with:
          target: ${{ env.STAGING_API_URL }}/openapi.json
          format: openapi
          rules_file_name: .zap/rules.tsv
          cmd_options: '-a'
          allow_issue_writing: false
      - name: Upload ZAP Report (staging)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: zap-report-staging
          path: report_html.html

  deploy-production:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.2.2
      - uses: ./.github/actions/nix-setup
      - name: Mask secrets
        run: |
          echo "::add-mask::${{ secrets.CLOUDFLARE_API_TOKEN }}"
          echo "::add-mask::${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
      - name: Deploy API to production
        working-directory: apps/api
        run: nix develop --command pnpm wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Health check (production)
        run: |
          sleep 5
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.techclip.app/api/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed: HTTP $STATUS"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 3 attempts"
          exit 1
