name: EAS Submit

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "配信するプラットフォーム"
        required: true
        type: choice
        options:
          - all
          - ios
          - android
        default: all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  submit-ios:
    if: ${{ inputs.platform == 'all' || inputs.platform == 'ios' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/nix-setup
      - uses: expo/expo-github-action@v8
        with:
          eas-version: "14.x"
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Submit iOS to App Store
        working-directory: apps/mobile
        run: nix develop --command bash -c "eas submit --platform ios --latest --non-interactive"

  submit-android:
    if: ${{ inputs.platform == 'all' || inputs.platform == 'android' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/nix-setup
      - uses: expo/expo-github-action@v8
        with:
          eas-version: "14.x"
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Submit Android to Google Play
        working-directory: apps/mobile
        run: nix develop --command bash -c "eas submit --platform android --latest --non-interactive"
