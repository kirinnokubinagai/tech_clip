name: Security

on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  zap-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/nix-setup
      - name: Start API server
        run: nix develop --command pnpm --filter @tech-clip/api dev &
        env:
          TURSO_DATABASE_URL: file:local.db
          TURSO_AUTH_TOKEN: dummy
          RUNPOD_API_KEY: dummy
          RUNPOD_ENDPOINT_ID: dummy
          BETTER_AUTH_SECRET: test-secret-key-for-ci
          ENVIRONMENT: test
      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:8787/health && break
            sleep 1
          done
      - name: Run DB migration
        run: nix develop --command sh -c "cd apps/api && pnpm exec drizzle-kit migrate"
        env:
          TURSO_DATABASE_URL: file:local.db
          TURSO_AUTH_TOKEN: dummy
      - name: Register test user and obtain auth token
        id: auth
        run: |
          SIGNUP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:8787/api/auth/sign-up/email \
            -H 'Content-Type: application/json' \
            -d '{"email":"${{ secrets.ZAP_TEST_EMAIL }}","password":"${{ secrets.ZAP_TEST_PASSWORD }}","name":"ZAP Test User"}')
          echo "サインアップHTTPステータス: $SIGNUP_STATUS"
          RESPONSE=$(curl -s -X POST http://localhost:8787/api/auth/sign-in \
            -H 'Content-Type: application/json' \
            -d '{"email":"${{ secrets.ZAP_TEST_EMAIL }}","password":"${{ secrets.ZAP_TEST_PASSWORD }}"}')
          TOKEN=$(echo "$RESPONSE" | jq -r '.data.session.token // .data.token // .token // empty' 2>/dev/null || echo "")
          if [ -z "$TOKEN" ]; then
            echo "警告: 認証トークンを取得できませんでした。未認証スキャンのみ実施します"
            TOKEN="dummy-token-for-unauthenticated-scan"
          fi
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
      - name: OWASP ZAP API Scan
        uses: zaproxy/action-api-scan@v0.9.0
        env:
          ZAP_AUTH_HEADER: Authorization
          ZAP_AUTH_HEADER_VALUE: Bearer ${{ steps.auth.outputs.token }}
        with:
          target: http://localhost:8787/openapi.json
          format: openapi
          rules_file_name: .zap/rules.tsv
          cmd_options: '-a'
          allow_issue_writing: false
      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html
