name: Security

on:
  pull_request:
    branches: [main]

jobs:
  zap-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Start API server
        run: pnpm --filter @tech-clip/api dev &
        env:
          TURSO_DATABASE_URL: file:local.db
          TURSO_AUTH_TOKEN: dummy
          RUNPOD_API_KEY: dummy
          RUNPOD_ENDPOINT_ID: dummy
          BETTER_AUTH_SECRET: test-secret-key-for-ci
          ENVIRONMENT: test
      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:8787/health && break
            sleep 1
          done
      - name: Run DB migration
        run: cd apps/api && pnpm drizzle-kit migrate
        env:
          TURSO_DATABASE_URL: file:local.db
          TURSO_AUTH_TOKEN: dummy
      - name: Register test user and obtain auth token
        id: auth
        run: |
          # テスト用ユーザー登録（Better Auth catch-allハンドラ経由）
          SIGNUP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:8787/api/auth/sign-up/email \
            -H 'Content-Type: application/json' \
            -d '{"email":"zap-test@techclip.test","password":"ZapTest1234!","name":"ZAP Test User"}')
          echo "サインアップHTTPステータス: $SIGNUP_STATUS"
          # サインインしてセッショントークンを取得
          RESPONSE=$(curl -s -X POST http://localhost:8787/api/auth/sign-in \
            -H 'Content-Type: application/json' \
            -d '{"email":"zap-test@techclip.test","password":"ZapTest1234!"}')
          TOKEN=$(echo "$RESPONSE" | jq -r '.data.session.token // .data.token // .token // empty' 2>/dev/null || echo "")
          if [ -z "$TOKEN" ]; then
            echo "警告: 認証トークンを取得できませんでした。未認証スキャンのみ実施します"
            TOKEN="dummy-token-for-unauthenticated-scan"
          fi
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
      # TODO: Cloudflare Workers 本番環境のスキャンは現状 localhost でのみ実施。
      #       Workers 環境（wrangler dev --remote など）でのリモートスキャンは
      #       ネットワーク構成の違いにより別途対応が必要。
      - name: OWASP ZAP API Scan
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          # /openapi.json エンドポイントから全ルートを自動検出してスキャン
          target: http://localhost:8787/openapi.json
          format: openapi
          rules_file_name: .zap/rules.tsv
          cmd_options: >-
            -config replacer.full_list\(0\).description=auth
            -config replacer.full_list\(0\).enabled=true
            -config replacer.full_list\(0\).matchtype=REQ_HEADER
            -config replacer.full_list\(0\).matchstr=Authorization
            -config replacer.full_list\(0\).replacement=Bearer\ ${{ steps.auth.outputs.token }}
          allow_issue_writing: false
      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html
