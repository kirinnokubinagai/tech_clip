name: EAS Build

on:
  push:
    branches: [main]

# デフォルトで全権限を read-only にする（ci.yml と統一）
permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/nix-setup
      - name: Mask EXPO_TOKEN in logs
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: echo "::add-mask::$EXPO_TOKEN"
      - uses: expo/expo-github-action@v8
        with:
          eas-version: "14.x"
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Build iOS
        working-directory: apps/mobile
        run: nix develop --command bash -c "eas build --platform ios --profile production --non-interactive"

  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/nix-setup
      - name: Mask EXPO_TOKEN in logs
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: echo "::add-mask::$EXPO_TOKEN"
      - uses: expo/expo-github-action@v8
        with:
          eas-version: "14.x"
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Build Android
        working-directory: apps/mobile
        run: nix develop --command bash -c "eas build --platform android --profile production --non-interactive"
