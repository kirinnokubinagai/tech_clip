name: EAS Build

on:
  push:
    branches: [main]

jobs:
  build-ios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/nix-setup
      - uses: expo/expo-github-action@v8
        with:
          eas-version: "14.x"
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Build iOS
        working-directory: apps/mobile
        run: nix develop --command bash -c "eas build --platform ios --profile production --non-interactive"
      - name: Submit iOS to App Store
        working-directory: apps/mobile
        run: nix develop --command bash -c "eas submit --platform ios --latest --non-interactive"

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/nix-setup
      - uses: expo/expo-github-action@v8
        with:
          eas-version: "14.x"
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Build Android
        working-directory: apps/mobile
        run: nix develop --command bash -c "eas build --platform android --profile production --non-interactive"
      - name: Submit Android to Google Play
        working-directory: apps/mobile
        run: nix develop --command bash -c "eas submit --platform android --latest --non-interactive"
