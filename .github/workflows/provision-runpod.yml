name: Provision RunPod

on:
  workflow_dispatch:
    inputs:
      endpoint_type:
        description: "Provision target"
        required: true
        default: "qwen"
        type: choice
        options:
          - qwen
      docker_image:
        description: "Qwen custom image"
        required: true
        type: string
      gpu_type:
        description: "RunPod GPU type"
        required: false
        default: "AMPERE_24"
        type: string
      workers_max:
        description: "Maximum workers"
        required: false
        default: "1"
        type: string
      dry_run:
        description: "Validate without creating or updating resources"
        required: false
        default: true
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  provision-runpod:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Provision or update RunPod endpoint
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          set -euo pipefail

          ARGS=(
            --type "${{ inputs.endpoint_type }}"
            --gpu "${{ inputs.gpu_type }}"
            --workers "${{ inputs.workers_max }}"
          )

          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            ARGS+=(--dry-run)
          fi

          if [[ "${{ inputs.endpoint_type }}" == "qwen" ]]; then
            if [[ -z "${{ inputs.docker_image }}" ]]; then
              echo "docker_image is required when endpoint_type=qwen"
              exit 1
            fi
            ARGS+=(--image "${{ inputs.docker_image }}")
          fi

          bash scripts/provision-runpod.sh "${ARGS[@]}"
