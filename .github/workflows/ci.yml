name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.claude/**'
      - 'LICENSE'
      - '.omc/**'
      - 'tests/e2e/maestro/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.claude/**'
      - 'LICENSE'
      - '.omc/**'
      - 'tests/e2e/maestro/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/nix-setup
      - name: Run lint, typecheck, test, audit in parallel
        run: |
          nix develop --command bash -c '
            pnpm lint &
            PID_LINT=$!
            pnpm typecheck &
            PID_TC=$!
            pnpm test &
            PID_TEST=$!
            pnpm audit &
            PID_AUDIT=$!

            FAILED=0
            wait $PID_LINT   || { echo "::error::lint failed"; FAILED=1; }
            wait $PID_TC     || { echo "::error::typecheck failed"; FAILED=1; }
            wait $PID_TEST   || { echo "::error::test failed"; FAILED=1; }
            wait $PID_AUDIT  || { echo "::error::audit failed"; FAILED=1; }
            exit $FAILED
          '
