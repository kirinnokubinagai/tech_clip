# オンボーディングフロー
# 初回起動時のウォークスルー4ページを順に進み、ログイン画面まで遷移することを確認する
#
# tags: smoke

appId: com.techclip.app
tags:
  - smoke

---

# アプリ起動
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- waitForAnimationToEnd:
    timeout: 30000
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    when:
      visible: "Open debugger"
    commands:
      - tapOn:
          point: "92%, 93%"
      - waitForAnimationToEnd:
          timeout: 2000
- takeScreenshot: screenshots/01-onboarding/01-launch

# --- ページ1: 技術記事をワンタップで保存 ---
- assertVisible:
    text: "技術記事をワンタップで保存"
    timeout: 60000
- runFlow:
    when:
      visible: "Open debugger"
    commands:
      - tapOn:
          point: "92%, 93%"
      - waitForAnimationToEnd:
          timeout: 2000
- tapOn:
    id: "next-button"
- waitForAnimationToEnd:
    timeout: 3000
- runFlow:
    when:
      visible: "Open debugger"
    commands:
      - tapOn:
          point: "92%, 93%"
      - waitForAnimationToEnd:
          timeout: 2000
- takeScreenshot: screenshots/01-onboarding/02-page2

# --- ページ2: AIが要約・翻訳 ---
- assertVisible:
    text: "AIが要約・翻訳"
    timeout: 10000
- runFlow:
    when:
      visible: "Open debugger"
    commands:
      - tapOn:
          point: "92%, 93%"
      - waitForAnimationToEnd:
          timeout: 2000
- tapOn:
    id: "next-button"
- waitForAnimationToEnd:
    timeout: 3000
- runFlow:
    when:
      visible: "Open debugger"
    commands:
      - tapOn:
          point: "92%, 93%"
      - waitForAnimationToEnd:
          timeout: 2000

# --- ページ3: お気に入り・タグで整理 ---
- assertVisible:
    text: "お気に入り・タグで整理"
    timeout: 10000
- runFlow:
    when:
      visible: "Open debugger"
    commands:
      - tapOn:
          point: "92%, 93%"
      - waitForAnimationToEnd:
          timeout: 2000
- tapOn:
    id: "next-button"
- waitForAnimationToEnd:
    timeout: 3000
- runFlow:
    when:
      visible: "Open debugger"
    commands:
      - tapOn:
          point: "92%, 93%"
      - waitForAnimationToEnd:
          timeout: 2000

# --- ページ4: さあ、始めましょう（最終ページ）---
- assertVisible:
    text: "さあ、始めましょう"
    timeout: 10000
- runFlow:
    when:
      visible: "Open debugger"
    commands:
      - tapOn:
          point: "92%, 93%"
      - waitForAnimationToEnd:
          timeout: 2000
- tapOn:
    id: "finish-button"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: screenshots/01-onboarding/03-done

# 新規登録画面に遷移することを確認
- assertVisible:
    text: "アカウントを作成"
