# フォロー・タイムラインフロー
# FOLLOWER ユーザーでログインし「フォロー中」モードに切り替えて
# FOLLOWEE の公開記事が表示されることを確認する
#
# 事前条件: seed でFOLLOWERがFOLLOWEEをフォロー済み、FOLLOWEEに記事が存在すること
#
# tags: social

appId: com.techclip.app
tags:
  - social

env:
  TEST_EMAIL: ${FOLLOWER_EMAIL}
  TEST_PASSWORD: ${FOLLOWER_PASSWORD}

---

# フレッシュ状態でFOLLOWERとしてアプリ起動
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    when:
      visible: "Open debugger"
    commands:
      - tapOn:
          point: "92%, 93%"
      - waitForAnimationToEnd:
          timeout: 1000
- runFlow:
    when:
      visible: "take pictures and record video"
    commands:
      - tapOn: "Don't allow"
      - waitForAnimationToEnd:
          timeout: 1000

- runFlow:
    file: "helpers/login-helper.yaml"
- waitForAnimationToEnd:
    timeout: 2000

# --- ホーム画面確認 ---
- assertVisible: "すべて"
- takeScreenshot: screenshots/09-follow-timeline/01-home

# --- フォロー中タイムライン切替 ---
- assertVisible:
    id: "feed-mode-toggle"
- tapOn:
    id: "feed-mode-toggle"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: "フォロー中"
- takeScreenshot: screenshots/09-follow-timeline/02-feed-mode

# フォロー中ユーザー（FOLLOWEE）の記事が表示されることを確認
- extendedWaitUntil:
    visible:
      id: "article-card"
    timeout: 10000

# FOLLOWEEの記事をタップして詳細へ（isNotOwner=true のためクローンボタンが表示される）
- tapOn:
    index: 0
    id: "article-card"
- waitForAnimationToEnd:
    timeout: 2000

# クローンボタンが表示されることを確認
- assertVisible:
    id: "clone-button"
- takeScreenshot: screenshots/09-follow-timeline/02b-article-clone-button

# 戻る
- tapOn:
    text: "戻る"
- waitForAnimationToEnd:
    timeout: 1000

# --- 自分モードに戻す ---
- tapOn:
    id: "feed-mode-toggle"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "自分"
- takeScreenshot: screenshots/09-follow-timeline/03-own-mode
