# 設定フロー: パスワード変更
# 設定画面からパスワード変更画面に遷移し、
# バリデーションエラーと正常フローを確認する
#
# NOTE: 実際のパスワード変更後は TEST_PASSWORD に戻すため、
#       変更前後のパスワードを変数で管理する
#
# tags: settings

appId: com.techclip.app
tags:
  - settings

env:
  TEST_EMAIL: ${CHANGEPASS_EMAIL}
  TEST_PASSWORD: ${CHANGEPASS_PASSWORD}
  NEW_PASSWORD: "NewPassword456!"

---

# パスワード変更専用ユーザーで cold start（clearState: true で共有ステートを使わない）
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    when:
      visible: "Open debugger"
    commands:
      - tapOn:
          point: "92%, 93%"
      - waitForAnimationToEnd:
          timeout: 1000
- runFlow:
    file: "00-login-helper.yaml"
- waitForAnimationToEnd:
    timeout: 2000

# 設定タブへ移動
- extendedWaitUntil:
    visible:
      id: "tab-settings"
    timeout: 30000
- tapOn:
    id: "tab-settings"
- waitForAnimationToEnd:
    timeout: 2000

# パスワード変更画面へ遷移
- assertVisible: "パスワード変更"
- tapOn: "パスワード変更"
- waitForAnimationToEnd:
    timeout: 3000

# --- パスワード変更画面の確認 ---
- extendedWaitUntil:
    visible:
      id: "change-password-screen"
    timeout: 10000
- assertVisible:
    text: "パスワード変更"
- assertVisible:
    id: "change-password-current-input"
- assertVisible:
    id: "change-password-new-input"
- assertVisible:
    id: "change-password-confirm-input"
- assertVisible:
    id: "change-password-save-button"
- takeScreenshot: screenshots/07b-change-password/01-change-password-screen

# --- バリデーション: 空のまま送信 ---
- tapOn:
    id: "change-password-save-button"
- assertVisible: "現在のパスワードを入力してください。"
- takeScreenshot: screenshots/07b-change-password/02-validation-empty

# --- バリデーション: 新しいパスワードが短すぎる ---
- tapOn:
    id: "change-password-current-input"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- inputText: ${TEST_PASSWORD}
- tapOn:
    id: "change-password-new-input"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- inputText: "short"
- hideKeyboard
- tapOn:
    id: "change-password-save-button"
- assertVisible: "パスワードは8文字以上で入力してください。"
- takeScreenshot: screenshots/07b-change-password/03-validation-too-short

# --- バリデーション: パスワードが一致しない ---
- tapOn:
    id: "change-password-new-input"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- eraseText
- inputText: ${NEW_PASSWORD}
- tapOn:
    id: "change-password-confirm-input"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- inputText: "DifferentPassword123!"
- hideKeyboard
- tapOn:
    id: "change-password-save-button"
- assertVisible: "パスワードが一致しません。"
- takeScreenshot: screenshots/07b-change-password/04-validation-mismatch

# --- 正常系: パスワード変更成功 ---
- tapOn:
    id: "change-password-confirm-input"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- eraseText
- inputText: ${NEW_PASSWORD}
- hideKeyboard
- tapOn:
    id: "change-password-save-button"
- waitForAnimationToEnd:
    timeout: 5000
# 成功後は設定画面に戻ることを確認
- extendedWaitUntil:
    visible:
      text: "設定"
    timeout: 10000
- takeScreenshot: screenshots/07b-change-password/05-after-change-success

# --- パスワードを元に戻す ---
# テスト後は TEST_PASSWORD に戻して後続テストに影響させない
- tapOn: "パスワード変更"
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible:
      id: "change-password-current-input"
    timeout: 10000
- tapOn:
    id: "change-password-current-input"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- inputText: ${NEW_PASSWORD}
- tapOn:
    id: "change-password-new-input"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- inputText: ${TEST_PASSWORD}
- tapOn:
    id: "change-password-confirm-input"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- inputText: ${TEST_PASSWORD}
- hideKeyboard
- tapOn:
    id: "change-password-save-button"
- waitForAnimationToEnd:
    timeout: 5000
- extendedWaitUntil:
    visible:
      text: "設定"
    timeout: 10000
- takeScreenshot: screenshots/07b-change-password/06-password-restored
