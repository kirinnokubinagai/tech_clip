# Android ANR (App Not Responding) ダイアログを dismiss するヘルパー
# Android 36 system image で複数の system process が ANR を起こす:
#   - Pixel Launcher isn't responding
#   - System UI isn't responding
#   - Process system isn't responding
#   - <App> isn't responding
#
# 各 ANR ダイアログには "Wait" / "Close app" ボタンがあり、Wait を押すと dialog が閉じる。
# 全 ANR text バリエーションを順次 check して、見つかったら Wait を押す。
appId: com.techclip.app
---

# 既知 ANR text の dismiss を順次試行
- runFlow:
    when:
      visible: "Pixel Launcher isn't responding"
    commands:
      - tapOn:
          text: "Wait"
      - waitForAnimationToEnd:
          timeout: 3000

- runFlow:
    when:
      visible: "System UI isn't responding"
    commands:
      - tapOn:
          text: "Wait"
      - waitForAnimationToEnd:
          timeout: 3000

- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn:
          text: "Wait"
      - waitForAnimationToEnd:
          timeout: 3000

# 任意の "<X> isn't responding" — Wait ボタンが見えるなら押す (汎用フォールバック)
- runFlow:
    when:
      visible:
        text: "Wait"
    commands:
      - runFlow:
          when:
            visible: "isn't responding"
          commands:
            - tapOn:
                text: "Wait"
            - waitForAnimationToEnd:
                timeout: 3000
