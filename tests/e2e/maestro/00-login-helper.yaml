# ログイン state 確保ヘルパー
# ホーム画面にいない場合（未ログイン）、シードユーザーでログインする
# clearState: false 前提の yaml から runFlow: で include して使用する

appId: com.techclip.app

env:
  TEST_EMAIL: ${TEST_EMAIL}
  TEST_PASSWORD: ${TEST_PASSWORD}

---

# 最初に onboarding ページ1 または login-email-input または「すべて」（ホーム）
# のいずれかが表示されるまで最大 60 秒待機する（Metro cold-start 対策）。
# どれが出るかは前回 state に依存するため、3 つのうちどれかで OK。
- extendedWaitUntil:
    visible: "技術記事をワンタップで保存|すべて|メールアドレス"
    timeout: 60000

# ホーム画面にいなければログインフローを実行
- runFlow:
    when:
      notVisible: "すべて"
    commands:
      # onboarding が表示されている場合は 4 ページ通過
      - runFlow:
          when:
            visible: "技術記事をワンタップで保存"
          commands:
            - tapOn:
                id: "next-button"
            - waitForAnimationToEnd:
                timeout: 2000
            - tapOn:
                id: "next-button"
            - waitForAnimationToEnd:
                timeout: 2000
            - tapOn:
                id: "next-button"
            - waitForAnimationToEnd:
                timeout: 2000
            - tapOn:
                id: "finish-button"
            - waitForAnimationToEnd:
                timeout: 3000
      # register 画面 → login リンク経由でログイン画面へ
      - runFlow:
          when:
            visible: "アカウントを作成"
          commands:
            - tapOn:
                id: "register-login-link"
            - waitForAnimationToEnd:
                timeout: 2000
      # ログイン画面でシードユーザーを使ってログイン
      - runFlow:
          when:
            visible: "パスワードを忘れた方"
          commands:
            - tapOn:
                id: "login-email-input"
            - inputText: ${TEST_EMAIL}
            - tapOn:
                id: "login-password-input"
            - inputText: ${TEST_PASSWORD}
            - hideKeyboard
            - tapOn:
                id: "login-submit-button"
            - waitForAnimationToEnd:
                timeout: 8000
