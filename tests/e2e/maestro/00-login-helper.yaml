# ログイン state 確保ヘルパー
# ホーム画面にいない場合（未ログイン）、シードユーザーでログインする
# clearState: false 前提の yaml から runFlow: で include して使用する

appId: com.techclip.app

env:
  TEST_EMAIL: ${TEST_EMAIL}
  TEST_PASSWORD: ${TEST_PASSWORD}

---

# Metro cold-start の初期ロードを待機（アニメーション停止を最大 60 秒）
- waitForAnimationToEnd:
    timeout: 60000

# ホーム画面にいなければログインフローを実行
- runFlow:
    when:
      notVisible: "すべて"
    commands:
      # onboarding ページ1 が表示されている場合は 4 ページ通過
      - runFlow:
          when:
            visible: "技術記事をワンタップで保存"
          commands:
            - tapOn:
                id: "next-button"
            - waitForAnimationToEnd:
                timeout: 2000
            - tapOn:
                id: "next-button"
            - waitForAnimationToEnd:
                timeout: 2000
            - tapOn:
                id: "next-button"
            - waitForAnimationToEnd:
                timeout: 2000
            - tapOn:
                id: "finish-button"
            - waitForAnimationToEnd:
                timeout: 3000
      # register 画面（アカウントを作成が見える）の場合 → login リンクをタップ
      - runFlow:
          when:
            visible: "アカウントを作成"
          commands:
            - tapOn:
                id: "register-login-link"
            - waitForAnimationToEnd:
                timeout: 2000
      # ログイン画面（パスワードを忘れた方が見える）の場合 → ログイン
      - runFlow:
          when:
            visible: "パスワードを忘れた方"
          commands:
            - tapOn:
                id: "login-email-input"
            - inputText: ${TEST_EMAIL}
            - tapOn:
                id: "login-password-input"
            - inputText: ${TEST_PASSWORD}
            - hideKeyboard
            - tapOn:
                id: "login-submit-button"
            - waitForAnimationToEnd:
                timeout: 8000
