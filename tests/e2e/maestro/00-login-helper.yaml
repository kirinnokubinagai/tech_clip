# ログイン state 確保ヘルパー

appId: com.techclip.app

env:
  TEST_EMAIL: ${TEST_EMAIL}
  TEST_PASSWORD: ${TEST_PASSWORD}

---

# 初期ロード（Metro cold-start 対策）
- waitForAnimationToEnd:
    timeout: 60000
# ホーム tab-home が出るまで or login-submit-button が出るまで待機（最大 30 秒）
- extendedWaitUntil:
    visible:
      id: "tab-home|login-submit-button|next-button|register-submit-button"
    timeout: 30000
    optional: true

# ホーム画面にいなければログインフローを実行
- runFlow:
    when:
      notVisible:
        id: "tab-home"
    commands:
      # onboarding ページ1 が表示されている場合は 4 ページ通過
      - runFlow:
          when:
            visible:
              id: "next-button"
          commands:
            - tapOn:
                id: "next-button"
            - waitForAnimationToEnd:
                timeout: 2000
            - tapOn:
                id: "next-button"
            - waitForAnimationToEnd:
                timeout: 2000
            - tapOn:
                id: "next-button"
            - waitForAnimationToEnd:
                timeout: 2000
            - tapOn:
                id: "finish-button"
            - waitForAnimationToEnd:
                timeout: 3000
      # register 画面 → login リンクをタップ
      - runFlow:
          when:
            visible:
              id: "register-submit-button"
          commands:
            - tapOn:
                id: "register-login-link"
            - waitForAnimationToEnd:
                timeout: 2000
      # ログイン画面 → ログイン実行
      - runFlow:
          when:
            visible:
              id: "login-submit-button"
          commands:
            - tapOn:
                id: "login-email-input"
            - inputText: ${TEST_EMAIL}
            - tapOn:
                id: "login-password-input"
            - inputText: ${TEST_PASSWORD}
            - hideKeyboard
            - tapOn:
                id: "login-submit-button"
            - waitForAnimationToEnd:
                timeout: 8000
