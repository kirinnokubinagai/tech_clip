# プレミアム購入フロー
# AI 制限超過後に paywall が表示され、購入ボタンをタップできることを確認する
# Note: 実際の課金は行わない（mock mode / sandbox 環境）
#
# tags: premium, purchase

appId: com.techclip.app
tags:
  - premium
  - purchase

env:
  TEST_EMAIL: ${TEST_EMAIL}
  TEST_PASSWORD: ${TEST_PASSWORD}
  API_BASE_URL: ${API_BASE_URL}

---

# ログイン済み状態でアプリ起動
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "90%, 93%"
      - waitForAnimationToEnd:
          timeout: 1000
- runFlow:
    file: "00-login-helper.yaml"
- waitForAnimationToEnd:
    timeout: 2000

# --- ホーム画面確認 ---
- assertVisible: "すべて"

# 記事詳細へ移動
- tapOn:
    index: 0
    id: "article-card"
- assertVisible:
    text: "戻る"

# AI 要約ボタンをタップ（freeAiUsesRemaining=0 のシードユーザー前提）
- tapOn:
    text: "要約"
- waitForAnimationToEnd:
    timeout: 3000

# paywall モーダルが表示されることを確認
- assertVisible:
    id: "premium-gate-container"
- takeScreenshot: screenshots/14-premium-purchase/01-paywall-shown

# プレミアム機能リスト確認
- assertVisible:
    text: "AI機能無制限"

# 購入ボタンが表示されることを確認（タップはしない：実課金を避けるため）
- assertVisible:
    id: "purchase-button"
- takeScreenshot: screenshots/14-premium-purchase/02-purchase-button-visible

# 閉じるボタンで paywall を閉じる
- tapOn:
    id: "close-button"
- waitForAnimationToEnd:
    timeout: 1000

# paywall が閉じることを確認
- assertNotVisible:
    id: "premium-gate-container"
- takeScreenshot: screenshots/14-premium-purchase/03-paywall-closed

# 戻るボタンでホームへ
- tapOn:
    text: "戻る"
- assertVisible:
    text: "すべて"
