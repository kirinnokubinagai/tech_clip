# 認証フロー: 新規登録
# オンボーディング「始める」から register 画面に遷移し、
# ユニークメールでアカウント作成 → プロフィール設定 → ホーム画面遷移を確認する
#
# tags: auth

appId: com.techclip.app
tags:
  - auth

env:
  TEST_EMAIL: ${TEST_EMAIL}
  TEST_PASSWORD: ${TEST_PASSWORD}
  TEST_NAME: ${TEST_NAME}

---

# アプリ起動（clearState でオンボーディング未閲覧状態に）
- launchApp:
    clearState: true
# ANR (Android 36 Pixel Launcher 既知バグ) を dismiss する
- runFlow: helpers/dismiss-anr.yaml
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- waitForAnimationToEnd:
    timeout: 30000
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
      - waitForAnimationToEnd:
          timeout: 3000

# オンボーディング: ページ1 → 2 → 3 → 4（始める）
# LogBox.ignoreAllLogs() で dev banner を無効化済みのため、unconditional 座標 tap は不要
- runFlow:
    when:
      visible: "take pictures and record video"
    commands:
      - tapOn: "Don't allow"
      - waitForAnimationToEnd:
          timeout: 1000

- extendedWaitUntil:
    visible:
      text: "技術記事をワンタップで保存"
    timeout: 60000
- tapOn:
    id: "next-button"
- extendedWaitUntil:
    visible:
      text: "AIが要約・翻訳"
    timeout: 10000
- tapOn:
    id: "next-button"
- extendedWaitUntil:
    visible:
      text: "お気に入り・タグで整理"
    timeout: 10000
- tapOn:
    id: "next-button"
- extendedWaitUntil:
    visible:
      text: "さあ、始めましょう"
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: "finish-button"
    timeout: 10000
- tapOn:
    id: "finish-button"
- waitForAnimationToEnd:
    timeout: 3000

# --- 新規登録画面 ---
- extendedWaitUntil:
    visible:
      text: "アカウントを作成"
    timeout: 15000
- takeScreenshot: screenshots/02-auth-register/01-register-screen
- assertVisible: "メールアドレス"
- assertVisible: "パスワード"

# バリデーション: 空のまま送信 → メールエラー
- extendedWaitUntil:
    visible:
      id: "register-submit-button"
    timeout: 10000
- tapOn:
    id: "register-submit-button"
- assertVisible: "メールアドレスを入力してください。"

# メールアドレス入力
- tapOn:
    id: "register-email-input"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- inputText: ${TEST_EMAIL}
- hideKeyboard  # キーボードが submit-button / password-input を覆うので閉じる

# バリデーション: メールのみで送信 → パスワードエラー
- tapOn:
    id: "register-submit-button"
- assertVisible: "パスワードを入力してください。"

# パスワード入力
- tapOn:
    id: "register-password-input"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- inputText: ${TEST_PASSWORD}

# フォーム送信 → プロフィール設定画面へ
- hideKeyboard
- tapOn:
    id: "register-submit-button"
- waitForAnimationToEnd:
    timeout: 8000

# --- プロフィール設定画面 ---
- extendedWaitUntil:
    visible:
      text: "プロフィールを設定"
    timeout: 10000
- takeScreenshot: screenshots/02-auth-register/02-profile-setup-screen

# 名前を入力して保存
- tapOn:
    id: "profile-setup-name-input"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- inputText: ${TEST_NAME}
- hideKeyboard
- tapOn:
    id: "profile-setup-save-button"
- waitForAnimationToEnd:
    timeout: 5000

# ホーム画面に遷移することを確認
- assertVisible:
    text: "すべて"
- takeScreenshot: screenshots/02-auth-register/03-home-after-register
