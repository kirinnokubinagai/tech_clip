# 認証フロー: 新規登録
# オンボーディング「始める」から register 画面に遷移し、
# ユニークメールでアカウント作成 → 自動ログイン → ホーム画面遷移を確認する
#
# tags: auth

appId: com.techclip.app
tags:
  - auth

env:
  TEST_EMAIL: ${TIMESTAMP}+maestro@techclip.app
  TEST_PASSWORD: ${TEST_PASSWORD}
  TEST_NAME: ${TEST_NAME}

---

# アプリ起動（clearState でオンボーディング未閲覧状態に）
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- waitForAnimationToEnd:
    timeout: 30000
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "90%, 93%"
      - waitForAnimationToEnd:
          timeout: 2000

# オンボーディング: ページ1 → 2 → 3 → 4（始める）
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "90%, 93%"
      - waitForAnimationToEnd:
          timeout: 2000
- tapOn:
    id: "next-button"
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "90%, 93%"
      - waitForAnimationToEnd:
          timeout: 2000
- tapOn:
    id: "next-button"
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "90%, 93%"
      - waitForAnimationToEnd:
          timeout: 2000
- tapOn:
    id: "next-button"
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "90%, 93%"
      - waitForAnimationToEnd:
          timeout: 2000
- tapOn:
    id: "finish-button"
- waitForAnimationToEnd:
    timeout: 3000

# --- 新規登録画面 ---
- assertVisible:
    text: "アカウントを作成"
- takeScreenshot: screenshots/02-auth-register/01-register-screen
- assertVisible: "名前"
- assertVisible: "メールアドレス"
- assertVisible: "パスワード"

# バリデーション: 空送信
- tapOn: "アカウントを作成"
- assertVisible: "名前を入力してください"

# 名前入力
- tapOn:
    text: "名前を入力"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- inputText: ${TEST_NAME}

# バリデーション: 名前のみで送信
- tapOn: "アカウントを作成"
- assertVisible: "メールアドレスを入力してください"

# メールアドレス入力
- tapOn:
    text: "example@domain.com"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- inputText: ${TEST_EMAIL}

# バリデーション: パスワードなしで送信
- tapOn: "アカウントを作成"
- assertVisible: "パスワードを入力してください"

# パスワード入力
- tapOn:
    text: "8文字以上"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- inputText: ${TEST_PASSWORD}

# フォーム送信 → 自動ログイン → ホーム画面
- tapOn: "アカウントを作成"
- waitForAnimationToEnd:
    timeout: 8000

# ホーム画面に遷移することを確認（自動ログイン）
- assertVisible:
    text: "すべて"
- takeScreenshot: screenshots/02-auth-register/02-home-after-register
