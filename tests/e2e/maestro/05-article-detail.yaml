# 記事詳細フロー
# ホーム画面から記事をタップして詳細表示、お気に入り・要約・翻訳操作を確認する
#
# tags: article

appId: com.techclip.app
tags:
  - article

env:
  TEST_EMAIL: ${TEST_EMAIL}
  TEST_PASSWORD: ${TEST_PASSWORD}

---

# ログイン済み状態でアプリ起動
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    when:
      visible: "Open debugger"
    commands:
      - tapOn:
          point: "92%, 93%"
      - waitForAnimationToEnd:
          timeout: 1000
- runFlow:
    file: "00-login-helper.yaml"
- waitForAnimationToEnd:
    timeout: 2000

# --- ホーム画面: 記事一覧表示 ---
- assertVisible: "すべて"
- takeScreenshot: screenshots/05-article-detail/01-home

# ソースフィルター確認
- assertVisible: "Zenn"
- assertVisible: "Qiita"
- assertVisible: "はてな"

# お気に入りフィルター
- tapOn:
    text: "お気に入りのみ表示"
- assertVisible:
    text: "お気に入りフィルター解除"
- tapOn:
    text: "お気に入りフィルター解除"
- assertVisible:
    text: "すべて"

# 記事カードをタップして詳細へ
- tapOn:
    index: 0
    id: "article-card"

# --- 記事詳細画面 ---
- assertVisible:
    text: "戻る"
- takeScreenshot: screenshots/05-article-detail/02-detail

# お気に入り追加
- tapOn:
    text: "お気に入り追加"
- assertVisible:
    text: "お気に入り解除"

# お気に入り解除
- tapOn:
    text: "お気に入り解除"
- assertVisible:
    text: "お気に入り追加"

# 要約ボタン
- assertVisible:
    text: "要約"
- tapOn:
    text: "要約"
- waitForAnimationToEnd

# 翻訳ボタン
- assertVisible:
    text: "翻訳"
- tapOn:
    text: "翻訳"
- waitForAnimationToEnd

# ブラウザで開くボタン確認
- assertVisible:
    text: "ブラウザで開く"

# 戻るボタンでホームへ
- tapOn:
    text: "戻る"
- assertVisible:
    text: "すべて"

# --- ソースフィルター: Zenn ---
- tapOn: "Zenn"
- waitForAnimationToEnd

# --- ソースフィルター: すべて ---
- tapOn: "すべて"
- waitForAnimationToEnd

# プルリフレッシュ
- swipe:
    start: "50%, 40%"
    end: "50%, 80%"
