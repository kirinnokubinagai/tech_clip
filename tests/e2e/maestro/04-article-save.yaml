# 記事保存フロー
# URLを入力して記事をパース・プレビュー表示し、保存するフローを確認する
#
# tags: smoke, article

appId: com.techclip.app
tags:
  - smoke
  - article

env:
  TEST_EMAIL: ${TEST_EMAIL}
  TEST_PASSWORD: ${TEST_PASSWORD}
  TEST_ARTICLE_URL: https://github.com/expo/expo

---

# アプリ起動（clearState: true でフレッシュ状態から起動）
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    when:
      visible: "Open debugger"
    commands:
      - tapOn:
          point: "92%, 93%"
      - waitForAnimationToEnd:
          timeout: 1000
- runFlow:
    file: "00-login-helper.yaml"
- waitForAnimationToEnd:
    timeout: 2000

# --- 記事保存画面への遷移 ---
- openLink: techclip://article/save

# --- 記事保存画面（fetch-button 存在で save 画面到達を判定）---
- assertVisible:
    id: "fetch-button"
    timeout: 60000
- assertVisible: "URL"
- takeScreenshot: screenshots/04-article-save/01-save-screen

# --- バリデーション: 空URL送信 ---
- tapOn:
    id: "fetch-button"
- assertVisible: "URLを入力してください。"

# --- バリデーション: 不正URL ---
- tapOn:
    text: "https://"
- inputText: "not-a-valid-url"
- tapOn:
    id: "fetch-button"
- assertVisible: "有効なURLを入力してください。"

# URLフィールドをクリア
- eraseText

# --- 正常系: 有効な GitHub URL で記事を取得 + プレビュー + 保存 ---
- tapOn:
    id: "input-field"
- eraseText
- inputText: ${TEST_ARTICLE_URL}
- assertVisible:
    id: "fetch-button"
    timeout: 10000
- tapOn:
    id: "fetch-button"

# プレビュー表示を最大 30 秒待機（外部 URL fetch + parse）
- assertVisible:
    id: "article-preview"
    timeout: 30000

# 保存ボタンをタップ
- tapOn:
    id: "save-button"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: screenshots/04-article-save/02-saved
