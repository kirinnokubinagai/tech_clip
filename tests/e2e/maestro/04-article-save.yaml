# 記事保存フロー
# URLを入力して記事をパース・プレビュー表示し、保存するフローを確認する
#
# tags: smoke, article

appId: com.techclip.app
tags:
  - smoke
  - article

env:
  TEST_EMAIL: ${TEST_EMAIL}
  TEST_PASSWORD: ${TEST_PASSWORD}
  TEST_ARTICLE_URL: https://zenn.dev/techclip_test/articles/sample-article

---

# ログイン済み状態でアプリ起動
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn: "DISMISS"
      - waitForAnimationToEnd:
          timeout: 1000

# --- 記事保存画面への遷移 ---
- openLink: techclip://article/save

# --- 記事保存画面 ---
- assertVisible:
    id: "save-screen-title"
    timeout: 5000
- assertVisible: "URL"
- takeScreenshot: screenshots/04-article-save/01-save-screen

# --- バリデーション: 空URL送信 ---
- tapOn:
    id: "fetch-button"
- assertVisible: "URLを入力してください"

# --- バリデーション: 不正URL ---
- tapOn:
    text: "https://"
- inputText: "not-a-valid-url"
- tapOn:
    id: "fetch-button"
- assertVisible: "有効なURLを入力してください"

# URLフィールドをクリア
- eraseText

# --- 正常系: 有効なURLで記事を取得 ---
- tapOn:
    text: "https://"
- inputText: ${TEST_ARTICLE_URL}
- tapOn:
    id: "fetch-button"

# ローディング表示を確認
- assertVisible:
    id: "fetch-loading"
    optional: true
- waitForAnimationToEnd

# プレビュー表示を確認
- assertVisible:
    id: "article-preview"
    timeout: 10000
- assertVisible: "プレビュー"

# 保存ボタンをタップ
- tapOn:
    id: "save-button"
- waitForAnimationToEnd

# 保存成功トースト確認
- assertVisible:
    text: "記事を保存しました"
    timeout: 5000
- takeScreenshot: screenshots/04-article-save/02-saved

# --- 戻るボタン ---
- launchApp:
    clearState: false
- openLink: techclip://article/save
- assertVisible:
    id: "save-screen-title"
    timeout: 5000
- tapOn:
    text: "戻る"
