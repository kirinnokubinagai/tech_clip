# 認証フロー: パスワードリセット
# ログイン画面からパスワードリセット画面に遷移し、
# バリデーションエラーと送信成功状態を確認する
#
# tags: auth

appId: com.techclip.app
tags:
  - auth

env:
  TEST_EMAIL: ${TEST_EMAIL}
  TEST_PASSWORD: ${TEST_PASSWORD}

---

# アプリ起動（clearState: true）
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- waitForAnimationToEnd:
    timeout: 30000
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    when:
      visible: "Open debugger"
    commands:
      - tapOn:
          point: "92%, 93%"
      - waitForAnimationToEnd:
          timeout: 2000

# オンボーディング通過
- runFlow:
    when:
      visible: "技術記事をワンタップで保存"
    commands:
      - assertVisible:
          text: "技術記事をワンタップで保存"
          timeout: 60000
      - tapOn:
          id: "next-button"
      - waitForAnimationToEnd:
          timeout: 2000
      - tapOn:
          id: "next-button"
      - waitForAnimationToEnd:
          timeout: 2000
      - tapOn:
          id: "next-button"
      - waitForAnimationToEnd:
          timeout: 2000
      - tapOn:
          id: "finish-button"
      - waitForAnimationToEnd:
          timeout: 3000

# register 画面 → ログイン画面へ移動
- runFlow:
    when:
      visible: "アカウントを作成"
    commands:
      - tapOn:
          id: "register-login-link"
      - waitForAnimationToEnd:
          timeout: 2000

# --- ログイン画面でパスワードリセットリンクをタップ ---
- assertVisible:
    text: "パスワードを忘れた方"
    timeout: 10000
- takeScreenshot: screenshots/03b-forgot-password/01-login-screen
- tapOn:
    id: "login-forgot-password-link"
- waitForAnimationToEnd:
    timeout: 3000

# --- パスワードリセット画面の確認 ---
- assertVisible:
    text: "パスワードをリセット"
    timeout: 10000
- assertVisible:
    id: "forgot-password-email-input"
- assertVisible:
    id: "forgot-password-submit-button"
- takeScreenshot: screenshots/03b-forgot-password/02-forgot-password-screen

# --- バリデーション: 空のまま送信 ---
- tapOn:
    id: "forgot-password-submit-button"
- assertVisible: "メールアドレスを入力してください。"
- takeScreenshot: screenshots/03b-forgot-password/03-validation-empty-email

# --- バリデーション: 無効なメール形式 ---
- tapOn:
    id: "forgot-password-email-input"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- inputText: "not-an-email"
- hideKeyboard
- tapOn:
    id: "forgot-password-submit-button"
- assertVisible: "メールアドレスの形式が正しくありません。"
- takeScreenshot: screenshots/03b-forgot-password/04-validation-invalid-email

# --- 正常系: 有効なメールアドレスで送信 ---
- tapOn:
    id: "forgot-password-email-input"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- clearText
- inputText: ${TEST_EMAIL}
- hideKeyboard
- tapOn:
    id: "forgot-password-submit-button"
- waitForAnimationToEnd:
    timeout: 5000
# 送信成功メッセージが表示されることを確認
- assertVisible: "パスワードリセットのメールを送信しました。"
- takeScreenshot: screenshots/03b-forgot-password/05-success-message

# ログイン画面に戻るリンクが表示される
- assertVisible:
    text: "ログイン"
