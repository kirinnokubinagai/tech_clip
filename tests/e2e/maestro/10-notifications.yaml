# 通知フロー
# FOLLOWER ユーザーでログインして通知一覧・既読操作を確認する
# seed-maestro-static で FOLLOWER に通知 2 件が事前作成される
#
# 事前条件: seed で FOLLOWER に通知が作成済みであること
#
# tags: notifications

appId: com.techclip.app
tags:
  - notifications

env:
  TEST_EMAIL: ${FOLLOWER_EMAIL}
  TEST_PASSWORD: ${FOLLOWER_PASSWORD}

---

# FOLLOWER ユーザーとして起動（seed データで通知あり）
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    when:
      visible: "Open debugger"
    commands:
      - tapOn:
          point: "92%, 93%"
      - waitForAnimationToEnd:
          timeout: 1000
- runFlow:
    when:
      visible: "take pictures and record video"
    commands:
      - tapOn: "Don't allow"
      - waitForAnimationToEnd:
          timeout: 1000

- runFlow:
    file: "helpers/login-helper.yaml"
- waitForAnimationToEnd:
    timeout: 2000

# --- ホーム画面確認 ---
- assertVisible: "すべて"

# 通知タブバッジ確認はオプション (前テストで既読化された場合や seed 状態によって 0 件のことがある)
# 存在すれば検証、無ければ skip
- runFlow:
    when:
      visible: ".*未読.*件.*"
    commands:
      - assertVisible: ".*未読.*件.*"

# 通知タブへ移動
- tapOn:
    id: "tab-notifications"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: screenshots/10-notifications/01-notifications-tab

# 通知画面タイトル確認
- assertVisible:
    text: "通知"

# seed で作成した通知一覧が表示されることを確認
- extendedWaitUntil:
    visible:
      id: "notifications-list"
    timeout: 5000

# 個別通知アイテムが表示されることを確認（seed で最低1件作成済み）
- extendedWaitUntil:
    visible:
      id: "notification-item"
    timeout: 5000

# 通知アイテムの内部要素確認
- assertVisible:
    id: "notification-title"
- assertVisible:
    id: "notification-body"
- assertVisible:
    id: "notification-time"

# 未読インジケーターが表示されること（seed 通知は is_read=false）
- assertVisible:
    id: "unread-indicator"

# seed 通知の種別アイコン確認（seed: follow + system）
- assertVisible:
    id: "notification-icon-follow"
- assertVisible:
    id: "notification-icon-system"
- takeScreenshot: screenshots/10-notifications/02-notifications-list

# 全既読ボタンが表示されることを確認（seed 通知は is_read=false）
- assertVisible:
    id: "mark-all-read-button"

# 全既読ボタンをタップ
- tapOn:
    id: "mark-all-read-button"
- waitForAnimationToEnd:
    timeout: 2000

# 既読反映の確認: unread-indicator が画面から消えていること
- assertNotVisible:
    id: "unread-indicator"

# 全既読後はタブバッジも消えていること (accessibilityLabel が消えることで判定)
- assertNotVisible:
    text: ".*未読.*件.*"

- takeScreenshot: screenshots/10-notifications/03-all-read

# ホームタブへ戻る
- tapOn:
    id: "tab-home"
- assertVisible:
    text: "すべて"
