# 検索フロー
# 検索タブから記事を検索し、結果をタップして詳細画面へ遷移することを確認する
#
# tags: search

appId: com.techclip.app
tags:
  - search

env:
  TEST_EMAIL: ${TEST_EMAIL}
  TEST_PASSWORD: ${TEST_PASSWORD}

---

# ログイン済み状態でアプリ起動
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "90%, 93%"
      - waitForAnimationToEnd:
          timeout: 1000
- runFlow:
    file: "00-login-helper.yaml"
- waitForAnimationToEnd:
    timeout: 2000

# 検索タブへ移動
- tapOn:
    text: "検索"

# --- 検索画面 ---
- assertVisible:
    text: "検索"
- takeScreenshot: screenshots/08-search/01-search-screen

# 検索フィールドをタップ
- tapOn:
    text: "記事を検索..."

# キーワードを入力
- inputText: "TypeScript"
- waitForAnimationToEnd

# 検索結果が表示されることを確認
- assertVisible: "TypeScript"

# --- 検索結果をクリア ---
- eraseText
- waitForAnimationToEnd

# 別キーワードで検索
- inputText: "React"
- waitForAnimationToEnd

# 検索結果の記事をタップ
- tapOn:
    index: 0
    text: "React"

# 記事詳細画面に遷移することを確認
- assertVisible:
    text: "戻る"

# 戻る
- tapOn:
    text: "戻る"
- assertVisible:
    text: "検索"
- takeScreenshot: screenshots/08-search/02-results
