# 検索フロー
# 検索タブから記事を検索し、結果をタップして詳細画面へ遷移することを確認する
#
# tags: search

appId: com.techclip.app
tags:
  - search

env:
  TEST_EMAIL: ${TEST_EMAIL}
  TEST_PASSWORD: ${TEST_PASSWORD}

---

# ログイン済み状態でアプリ起動
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn: "DISMISS"
      - waitForAnimationToEnd:
          timeout: 1000

# 検索タブへ移動
- tapOn:
    text: "検索"

# --- 検索画面 ---
- assertVisible:
    text: "検索"
    timeout: 5000
- takeScreenshot: screenshots/08-search/01-search-screen

# 検索フィールドをタップ
- tapOn:
    text: "記事を検索..."

# キーワードを入力
- inputText: "TypeScript"
- waitForAnimationToEnd

# 検索結果が表示されることを確認
- assertVisible: "TypeScript"

# --- 検索結果をクリア ---
- eraseText
- waitForAnimationToEnd

# 別キーワードで検索
- inputText: "React"
- waitForAnimationToEnd

# 検索結果の記事をタップ
- tapOn:
    index: 0
    text: "React"

# 記事詳細画面に遷移することを確認
- assertVisible:
    text: "戻る"
    timeout: 5000

# 戻る
- tapOn:
    text: "戻る"
- assertVisible:
    text: "検索"
    timeout: 5000
- takeScreenshot: screenshots/08-search/02-results
