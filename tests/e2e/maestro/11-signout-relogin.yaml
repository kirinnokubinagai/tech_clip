# サインアウト・再ログインフロー
# 設定画面からサインアウトし、再度ログインできることを確認する
#
# tags: auth

appId: com.techclip.app
tags:
  - auth

env:
  TEST_EMAIL: ${TEST_EMAIL}
  TEST_PASSWORD: ${TEST_PASSWORD}

---

# ログイン済み状態でアプリ起動
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    file: "helpers/login-helper.yaml"
- waitForAnimationToEnd:
    timeout: 2000

# --- ホーム画面確認 ---
- assertVisible: "すべて"

# 設定タブへ移動
- tapOn:
    id: "tab-settings"
- waitForAnimationToEnd:
    timeout: 1000
- assertVisible:
    text: "設定"
- takeScreenshot: screenshots/11-signout-relogin/01-settings

# ログアウトボタンをタップ（設定画面）
- tapOn:
    text: "ログアウト"
- waitForAnimationToEnd:
    timeout: 1000
# 確認ダイアログでログアウトボタンを再度タップ（ダイアログ内の2つ目のログアウト）
- tapOn:
    text: "ログアウト"
    index: 1
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: screenshots/11-signout-relogin/02-after-signout

# ログイン画面が表示されることを確認
- assertVisible:
    text: "ログイン"

# --- 再ログイン ---
# ログイン画面に自動遷移済みのはずなので、この tap は不要（既に login 画面）
- waitForAnimationToEnd:
    timeout: 1000
- tapOn:
    id: "login-email-input"
- inputText: ${TEST_EMAIL}
- hideKeyboard  # password input が keyboard に隠れないよう一旦閉じる
- tapOn:
    id: "login-password-input"
- inputText: ${TEST_PASSWORD}
# keyboard を閉じるため画面上部 "TechClip" タイトル (TextInput 外) を tap
# (hideKeyboard は keyboard 不在時 BACK key を送って画面を pop してしまう)
- tapOn:
    text: "TechClip"
- waitForAnimationToEnd:
    timeout: 500
- tapOn:
    id: "login-submit-button"
- waitForAnimationToEnd:
    timeout: 5000

# ホーム画面に戻ることを確認
- assertVisible:
    text: "すべて"
- takeScreenshot: screenshots/11-signout-relogin/03-relogged-in
