# 認証フロー: 新規登録
# 名前・メール・パスワードを入力してアカウント作成フローを確認する
#
# tags: auth

appId: com.techclip.app
tags:
  - auth

env:
  TEST_EMAIL: ${TEST_EMAIL}
  TEST_PASSWORD: ${TEST_PASSWORD}
  TEST_NAME: ${TEST_NAME}

---

# アプリ起動（オンボーディング済み状態から）
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000

# オンボーディングをスキップ
- waitForAnimationToEnd:
    timeout: 15000
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "90%, 93%"
      - waitForAnimationToEnd:
          timeout: 1000
- tapOn: "次へ"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: "次へ"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: "次へ"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: "始める"
- waitForAnimationToEnd:
    timeout: 3000

- assertVisible:
    text: "ログイン"

# ログイン画面から新規登録へ
- assertVisible: "ログイン"
- tapOn: "新規登録"

# --- 新規登録画面 ---
- assertVisible:
    text: "アカウントを作成"
- takeScreenshot: screenshots/03-auth-register/01-register-screen
- assertVisible: "名前"
- assertVisible: "メールアドレス"
- assertVisible: "パスワード"

# バリデーション: 空送信
- tapOn: "アカウントを作成"
- assertVisible: "名前を入力してください"

# 名前入力
- tapOn:
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
    text: "名前を入力"
- inputText: ${TEST_NAME}

# バリデーション: 名前のみで送信
- tapOn: "アカウントを作成"
- assertVisible: "メールアドレスを入力してください"

# メールアドレス入力
- tapOn:
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
    text: "example@domain.com"
- inputText: ${TEST_EMAIL}

# バリデーション: パスワードなしで送信
- tapOn: "アカウントを作成"
- assertVisible: "パスワードを入力してください"

# パスワード入力
- tapOn:
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
    text: "8文字以上"
- inputText: ${TEST_PASSWORD}

# フォーム送信
- tapOn: "アカウントを作成"
- waitForAnimationToEnd:
    timeout: 5000

# ログイン画面へのリンク確認
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- waitForAnimationToEnd:
    timeout: 15000
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "90%, 93%"
      - waitForAnimationToEnd:
          timeout: 1000
- tapOn: "次へ"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: "次へ"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: "次へ"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: "始める"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible:
    text: "ログイン"
- tapOn: "新規登録"
- assertVisible:
    text: "すでにアカウントをお持ちですか？"
- tapOn: "ログイン"
- assertVisible:
    text: "ログイン"
- takeScreenshot: screenshots/03-auth-register/02-back-to-login
