appId: com.techclip.app
---
# TechClip Maestro E2E テスト設定
# 実行方法: maestro test tests/e2e/maestro/

# デフォルトタイムアウト（ミリ秒）
# 要素が見つかるまで待機する最大時間
waitForAppToSettleTimeout: 3000

# 環境変数（.env.yaml で上書き可能、コミット禁止）
env:
  TEST_EMAIL: test-e2e@techclip.example.com
  TEST_PASSWORD: E2ETestPass123!
  TEST_NAME: E2Eテストユーザー
  API_BASE_URL: http://localhost:8787
  # シナリオ別ユーザー（seed-maestro-static.ts で作成）
  FOLLOWER_EMAIL: follower+maestro@techclip.app
  FOLLOWER_PASSWORD: TestPassword123!
  FOLLOWEE_EMAIL: followee+maestro@techclip.app
  FOLLOWEE_PASSWORD: TestPassword123!
  PREMIUM_EMAIL: premium+maestro@techclip.app
  PREMIUM_PASSWORD: TestPassword123!
