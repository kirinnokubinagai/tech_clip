# 認証フロー: ログイン
# メール・パスワードを入力してログインし、ホーム画面に遷移することを確認する
#
# tags: smoke, auth

appId: com.techclip.app
tags:
  - smoke
  - auth

env:
  TEST_EMAIL: ${TEST_EMAIL}
  TEST_PASSWORD: ${TEST_PASSWORD}

---

# アプリ起動（オンボーディング済み状態）
- launchApp:
    clearState: true

# オンボーディングをスキップしてログイン画面へ
- tapOn:
    id: "next-button"
- tapOn:
    id: "next-button"
- tapOn:
    id: "next-button"
- tapOn:
    id: "finish-button"

# --- ログイン画面 ---
- assertVisible: "ログイン"
- assertVisible: "メールアドレス"
- takeScreenshot: screenshots/02-auth-login/01-login-screen

# メールアドレス入力
- tapOn:
    id: "login-email-input"
- inputText: ${TEST_EMAIL}

# パスワード入力
- tapOn:
    id: "login-password-input"
- inputText: ${TEST_PASSWORD}

# パスワード表示トグルの確認
- tapOn:
    id: "login-toggle-password"
- assertVisible: "隠す"
- tapOn:
    id: "login-toggle-password"
- assertVisible: "表示"

# ログインボタンをタップ
- tapOn:
    id: "login-submit-button"

# ローディング中の表示確認（任意）
- waitForAnimationToEnd

# ホーム画面に遷移することを確認
- assertVisible: "すべて"
- takeScreenshot: screenshots/02-auth-login/02-home-after-login

# --- バリデーションエラーのテスト ---
- launchApp:
    clearState: true

# オンボーディングスキップ
- tapOn: "次へ"
- tapOn: "次へ"
- tapOn: "次へ"
- tapOn: "はじめる"

# 空のまま送信 → エラー表示
- tapOn:
    id: "login-submit-button"
- assertVisible: "メールアドレスを入力してください"

# メールのみ入力してパスワード短すぎエラー
- tapOn:
    id: "login-email-input"
- inputText: "test@example.com"
- tapOn:
    id: "login-password-input"
- inputText: "short"
- tapOn:
    id: "login-submit-button"
- assertVisible: "8文字以上"

# 新規登録リンクへの遷移確認
- tapOn:
    id: "login-register-link"
- assertVisible: "アカウントを作成"
