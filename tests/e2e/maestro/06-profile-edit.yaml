# プロフィール表示・編集フロー
# プロフィールタブで基本表示を確認し、編集画面で名前/bio/SNSリンクを更新できることを確認する
#
# tags: profile

appId: com.techclip.app
tags:
  - profile

env:
  TEST_EMAIL: ${TEST_EMAIL}
  TEST_PASSWORD: ${TEST_PASSWORD}

---

# ログイン済み状態でアプリ起動
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    when:
      visible: "Open debugger"
    commands:
      - tapOn:
          point: "92%, 93%"
      - waitForAnimationToEnd:
          timeout: 1000
- runFlow:
    file: "00-login-helper.yaml"
- waitForAnimationToEnd:
    timeout: 2000

# --- プロフィールタブ表示確認 ---
- tapOn:
    id: "tab-profile"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: screenshots/06-profile-edit/01-profile-tab

# プロフィールヘッダーが表示されること
- extendedWaitUntil:
    visible:
      id: "profile-header"
    timeout: 10000

# ユーザー名が表示されること
- assertVisible:
    id: "profile-name"

# アバター画像またはフォールバックが表示されること
- runFlow:
    when:
      visible:
        id: "profile-avatar-image"
    commands:
      - assertVisible:
          id: "profile-avatar-image"
- runFlow:
    when:
      visible:
        id: "profile-avatar-fallback"
    commands:
      - assertVisible:
          id: "profile-avatar-fallback"

# 設定ボタンが表示されること
- assertVisible:
    id: "profile-settings-button"

# フォロワー・フォロー統計が表示されること
- assertVisible:
    id: "profile-stats"
- assertVisible:
    id: "profile-followers-count"
- assertVisible:
    id: "profile-following-count"

- takeScreenshot: screenshots/06-profile-edit/02-profile-header

# --- プロフィール編集画面へ ---
- openLink: techclip://profile/edit
- extendedWaitUntil:
    visible:
      id: "profile-edit-screen"
    timeout: 30000
- assertVisible: "プロフィール編集"
- takeScreenshot: screenshots/06-profile-edit/03-edit-screen

# アバター変更ボタン
- assertVisible:
    id: "profile-edit-avatar-button"
- assertVisible:
    id: "profile-edit-camera-badge"

# アバター画像またはフォールバックが表示されること（編集画面）
- runFlow:
    when:
      visible:
        id: "profile-edit-avatar-image"
    commands:
      - assertVisible:
          id: "profile-edit-avatar-image"
- runFlow:
    when:
      visible:
        id: "profile-edit-avatar-fallback"
    commands:
      - assertVisible:
          id: "profile-edit-avatar-fallback"

# フォーム入力フィールドの確認（スクロール不要な初期表示部分）
- assertVisible:
    id: "profile-edit-name-input"
- assertVisible:
    id: "profile-edit-username-input"

# bio フィールドに入力してプロフィール画面での表示を後で確認する
- tapOn:
    id: "profile-edit-bio-input"
- eraseText
- inputText: "E2E test bio"
- hideKeyboard

- assertVisible:
    id: "profile-edit-save-button"

# スクロールしてソーシャルリンク入力フィールドを確認
- swipe:
    start: "50%, 70%"
    end: "50%, 30%"
- waitForAnimationToEnd:
    timeout: 500
- assertVisible:
    id: "profile-edit-twitter-input"
- assertVisible:
    id: "profile-edit-github-input"
- assertVisible:
    id: "profile-edit-website-input"
- takeScreenshot: screenshots/06-profile-edit/03b-edit-social-links

# 保存ボタンをタップ（bio が保存される）
- tapOn:
    id: "profile-edit-save-button"
- waitForAnimationToEnd:
    timeout: 3000

# --- プロフィールタブで bio が表示されることを確認 ---
- tapOn:
    id: "tab-profile"
- waitForAnimationToEnd:
    timeout: 3000

# bio が設定されたので profile-bio が表示されること
- extendedWaitUntil:
    visible:
      id: "profile-bio"
    timeout: 5000
- takeScreenshot: screenshots/06-profile-edit/04-profile-bio

# 戻るボタンが存在することを確認（編集画面に戻り確認後、back は既にナビゲート済み）
- openLink: techclip://profile/edit
- extendedWaitUntil:
    visible:
      id: "profile-edit-back-button"
    timeout: 30000

# bio をクリア（テストの冪等性確保）
- tapOn:
    id: "profile-edit-bio-input"
- eraseText
- hideKeyboard
- tapOn:
    id: "profile-edit-save-button"
- waitForAnimationToEnd:
    timeout: 3000

- tapOn:
    id: "profile-edit-back-button"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: screenshots/06-profile-edit/05-back
