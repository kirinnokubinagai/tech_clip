# プロフィール表示・編集フロー
# プロフィールタブで基本表示を確認し、編集画面で名前/bio/SNSリンクを更新できることを確認する
#
# tags: profile

appId: com.techclip.app
tags:
  - profile

env:
  TEST_EMAIL: ${TEST_EMAIL}
  TEST_PASSWORD: ${TEST_PASSWORD}

---

# ログイン済み状態でアプリ起動
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    when:
      visible: "Open debugger"
    commands:
      - tapOn:
          point: "92%, 93%"
      - waitForAnimationToEnd:
          timeout: 1000
- runFlow:
    file: "00-login-helper.yaml"
- waitForAnimationToEnd:
    timeout: 2000

# --- プロフィールタブ表示確認 ---
- tapOn:
    id: "tab-profile"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: screenshots/06-profile-edit/01-profile-tab

# プロフィールヘッダーが表示されること
- assertVisible:
    id: "profile-header"
    timeout: 10000

# ユーザー名が表示されること
- assertVisible:
    id: "profile-name"

# 設定ボタンが表示されること
- assertVisible:
    id: "profile-settings-button"

# フォロワー・フォロー統計が表示されること
- assertVisible:
    id: "profile-stats"

- takeScreenshot: screenshots/06-profile-edit/02-profile-header

# --- プロフィール編集画面へ ---
- openLink: techclip://profile/edit
- assertVisible:
    id: "profile-edit-screen"
    timeout: 30000
- assertVisible: "プロフィール編集"
- takeScreenshot: screenshots/06-profile-edit/03-edit-screen

# アバター変更ボタン
- assertVisible:
    id: "profile-edit-avatar-button"
- assertVisible:
    id: "profile-edit-camera-badge"

# 戻るボタンが存在
- assertVisible:
    id: "profile-edit-back-button"

# 戻るボタンで終了（validation + 更新フローはフォーム詳細が画面内スクロールで複雑なため基本確認のみ）
- tapOn:
    id: "profile-edit-back-button"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: screenshots/06-profile-edit/04-back
