# プロフィール編集フロー
# プロフィール編集画面で名前/bio/SNSリンクを更新できることを確認する
#
# tags: profile

appId: com.techclip.app
tags:
  - profile

env:
  TEST_EMAIL: ${TEST_EMAIL}
  TEST_PASSWORD: ${TEST_PASSWORD}

---

# ログイン済み状態でアプリ起動
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    file: "00-login-helper.yaml"
- waitForAnimationToEnd:
    timeout: 2000

# プロフィール編集画面へ deeplink 遷移
- openLink: techclip://profile/edit
- extendedWaitUntil:
    visible:
      id: "profile-edit-screen"
    timeout: 30000
- assertVisible: "プロフィール編集"
- takeScreenshot: screenshots/06-profile-edit/01-edit-screen

# アバター変更ボタン
- assertVisible:
    id: "profile-edit-avatar-button"
- assertVisible:
    id: "profile-edit-camera-badge"

# 戻るボタンが存在
- assertVisible:
    id: "profile-edit-back-button"

# 戻るボタンで終了（validation + 更新フローはフォーム詳細が画面内スクロールで複雑なため基本確認のみ）
- tapOn:
    id: "profile-edit-back-button"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: screenshots/06-profile-edit/02-back
