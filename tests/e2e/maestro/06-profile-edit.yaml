# プロフィール編集フロー
# プロフィールタブからプロフィール編集画面へ遷移し、名前・bio・SNSリンクを更新する
#
# tags: profile

appId: com.techclip.app
tags:
  - profile

env:
  TEST_EMAIL: ${TEST_EMAIL}
  TEST_PASSWORD: ${TEST_PASSWORD}

---

# ログイン済み状態でアプリ起動
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    when:
      visible: "Open debugger"
    commands:
      - tapOn:
          point: "92%, 93%"
      - waitForAnimationToEnd:
          timeout: 1000
- runFlow:
    file: "00-login-helper.yaml"
- waitForAnimationToEnd:
    timeout: 2000

# プロフィールタブへ移動
- tapOn:
    id: "tab-profile"

# --- プロフィール画面 ---
- assertVisible:
    text: "プロフィール"
- takeScreenshot: screenshots/06-profile-edit/01-profile-screen

# プロフィール編集画面へ遷移（設定ボタン or 編集ボタン）
- tapOn:
    id: "tab-settings"

# 設定画面経由でプロフィール確認
- assertVisible:
    text: "アカウント"

# --- プロフィール編集画面への直接遷移 ---
- openLink: techclip://profile/edit

# --- プロフィール編集画面 ---
- extendedWaitUntil:
    visible:
      id: "profile-edit-screen"
    timeout: 30000
- assertVisible: "プロフィール編集"

# アバター変更ボタンの確認
- assertVisible:
    id: "profile-edit-avatar-button"
- assertVisible:
    id: "profile-edit-camera-badge"

# --- バリデーション: 名前を空にして保存 ---
- eraseText
- tapOn: "保存する"
- assertVisible: "名前を入力してください。"

# --- 正常系: プロフィール更新 ---
- tapOn:
    text: "名前を入力"
- inputText: "テストユーザー更新"

- tapOn:
    text: "username"
- inputText: "testuser_e2e"

- tapOn:
    text: "自己紹介を入力"
- inputText: "E2Eテスト用のプロフィールです"

# SNSリンク
- scroll
- tapOn:
    text: "your_handle"
- inputText: "testuser_e2e"

- tapOn:
    text: "your_handle"
- inputText: "testuser_e2e"

# 保存
- hideKeyboard
- tapOn: "保存する"
- waitForAnimationToEnd

# 保存成功トーストまたは前画面への遷移を確認
- assertVisible:
    text: "プロフィールを更新しました"
- takeScreenshot: screenshots/06-profile-edit/02-saved

# 戻るボタン
- tapOn:
    id: "profile-edit-back-button"
