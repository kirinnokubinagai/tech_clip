# 認証フロー: ログイン
# clearState: true でアプリ起動後、onboarding → register 画面 → login リンク経由でログイン画面に遷移し、
# シードユーザーでログインしてホーム画面遷移を確認する
#
# tags: smoke, auth

appId: com.techclip.app
tags:
  - smoke
  - auth

env:
  TEST_EMAIL: ${TEST_EMAIL}
  TEST_PASSWORD: ${TEST_PASSWORD}

---

# アプリ起動（clearState: true）
- launchApp:
    clearState: true
# ANR (Android 36 Pixel Launcher 既知バグ) を dismiss する
- runFlow: helpers/dismiss-anr.yaml
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- waitForAnimationToEnd:
    timeout: 30000
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    when:
      visible: "Open debugger"
    commands:
      - tapOn:
          point: "92%, 93%"
      - waitForAnimationToEnd:
          timeout: 2000

# オンボーディング: 4ページ通過（next-button x3 → finish-button）
- runFlow:
    when:
      visible: "take pictures and record video"
    commands:
      - tapOn: "Don't allow"
      - waitForAnimationToEnd:
          timeout: 1000

- extendedWaitUntil:
    visible:
      text: "技術記事をワンタップで保存"
    timeout: 60000
- tapOn:
    id: "next-button"
- extendedWaitUntil:
    visible:
      text: "AIが要約・翻訳"
    timeout: 10000
- tapOn:
    id: "next-button"
- extendedWaitUntil:
    visible:
      text: "お気に入り・タグで整理"
    timeout: 10000
- tapOn:
    id: "next-button"
- extendedWaitUntil:
    visible:
      id: "finish-button"
    timeout: 10000
- tapOn:
    id: "finish-button"
- waitForAnimationToEnd:
    timeout: 3000

# hasAccount=false のため register 画面にリダイレクトされる
# expo-router Link の testID は maestro が見つけられないため、text "ログイン" を tap する
# (register 画面では "ログイン" は 1 箇所だけ "すでにアカウントをお持ちですか? ログイン" で表示される)
- extendedWaitUntil:
    visible: "アカウントを作成"
    timeout: 15000
- takeScreenshot: screenshots/03-auth-login/00-register-screen
- tapOn:
    text: "ログイン"
- waitForAnimationToEnd:
    timeout: 3000
# ログイン画面に遷移したことを確認
- extendedWaitUntil:
    visible:
      id: "login-email-input"
    timeout: 10000

# --- ログイン画面 ---
- assertVisible:
    text: "ログイン"
- assertVisible: "メールアドレス"
- takeScreenshot: screenshots/03-auth-login/01-login-screen

# メールアドレス入力
- tapOn:
    id: "login-email-input"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- inputText: ${TEST_EMAIL}
- hideKeyboard  # キーボードが password input を覆うので一度閉じる

# パスワード入力
- tapOn:
    id: "login-password-input"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- inputText: ${TEST_PASSWORD}
- hideKeyboard  # キーボードが login-toggle-password を覆うので閉じる

# パスワード表示トグルの確認
- tapOn:
    id: "login-toggle-password"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- assertVisible: "隠す"
- tapOn:
    id: "login-toggle-password"
- assertVisible: "表示"

# ログインボタンをタップ (hideKeyboard は keyboard が無いと BACK key を送信して
# ナビゲーションを pop してしまうため使わない)
- tapOn:
    id: "login-submit-button"

# ホーム画面に遷移することを確認
- waitForAnimationToEnd:
    timeout: 8000
- assertVisible:
    text: "すべて"
- takeScreenshot: screenshots/03-auth-login/02-home-after-login

# --- バリデーションエラーのテスト（register 画面経由でログイン画面へ）---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- waitForAnimationToEnd:
    timeout: 30000
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    when:
      visible: "Open debugger"
    commands:
      - tapOn:
          point: "92%, 93%"
      - waitForAnimationToEnd:
          timeout: 2000
- extendedWaitUntil:
    visible:
      text: "技術記事をワンタップで保存"
    timeout: 60000
- tapOn:
    id: "next-button"
- extendedWaitUntil:
    visible:
      text: "AIが要約・翻訳"
    timeout: 10000
- tapOn:
    id: "next-button"
- extendedWaitUntil:
    visible:
      text: "お気に入り・タグで整理"
    timeout: 10000
- tapOn:
    id: "next-button"
- extendedWaitUntil:
    visible:
      id: "finish-button"
    timeout: 10000
- tapOn:
    id: "finish-button"
- extendedWaitUntil:
    visible:
      text: "アカウントを作成"
    timeout: 15000
- tapOn:
    text: "ログイン"
- waitForAnimationToEnd:
    timeout: 2000

# 空のまま送信 → エラー表示
- tapOn:
    id: "login-submit-button"
- assertVisible: "メールアドレスを入力してください。"

# メールのみ入力してパスワード短すぎエラー
- tapOn:
    id: "login-email-input"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- inputText: "test@example.com"
- hideKeyboard  # キーボードが password 欄を覆って tap が空振りしないよう閉じる
- tapOn:
    id: "login-password-input"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- inputText: "short"
# キーボードを閉じるため "TechClip" タイトル (TextInput 外) を tap
- tapOn:
    text: "TechClip"
- waitForAnimationToEnd:
    timeout: 500
- tapOn:
    id: "login-submit-button"
- assertVisible: "8文字以上"

# 新規登録リンクへの遷移確認
# 画面下方にあり、エラー alert が表示されているとさらに押し下げられる。
# 複数回 swipe で確実に visible にしてから tap する。
- swipe:
    start: "50%, 80%"
    end: "50%, 20%"
- waitForAnimationToEnd:
    timeout: 500
- swipe:
    start: "50%, 80%"
    end: "50%, 20%"
- waitForAnimationToEnd:
    timeout: 500
- runFlow:
    when:
      visible:
        id: "login-register-link"
    commands:
      - tapOn:
          id: "login-register-link"
      - extendedWaitUntil:
          visible:
            text: "アカウントを作成"
          timeout: 5000
