# 認証フロー: ログイン
# メール・パスワードを入力してログインし、ホーム画面に遷移することを確認する
#
# tags: smoke, auth

appId: com.techclip.app
tags:
  - smoke
  - auth

env:
  TEST_EMAIL: ${TEST_EMAIL}
  TEST_PASSWORD: ${TEST_PASSWORD}

---

# アプリ起動（オンボーディング済み状態）
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000

# オンボーディングをスキップしてログイン画面へ
- waitForAnimationToEnd:
    timeout: 15000
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "90%, 93%"
      - waitForAnimationToEnd:
          timeout: 1000
- tapOn:
    id: "skip-button"
- waitForAnimationToEnd:
    timeout: 3000

# --- ログイン画面 ---
- assertVisible:
    text: "ログイン"
- assertVisible: "メールアドレス"
- takeScreenshot: screenshots/02-auth-login/01-login-screen

# メールアドレス入力
- tapOn:
    id: "login-email-input"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- inputText: ${TEST_EMAIL}

# パスワード入力
- tapOn:
    id: "login-password-input"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- inputText: ${TEST_PASSWORD}

# パスワード表示トグルの確認
- tapOn:
    id: "login-toggle-password"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- assertVisible: "隠す"
- tapOn:
    id: "login-toggle-password"
- assertVisible: "表示"

# ログインボタンをタップ
- tapOn:
    id: "login-submit-button"

# ホーム画面に遷移することを確認
- assertVisible:
    text: "すべて"
- takeScreenshot: screenshots/02-auth-login/02-home-after-login

# --- バリデーションエラーのテスト ---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000

# オンボーディングスキップ
- waitForAnimationToEnd:
    timeout: 15000
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "90%, 93%"
      - waitForAnimationToEnd:
          timeout: 1000
- tapOn:
    id: "skip-button"
- waitForAnimationToEnd:
    timeout: 3000

# 空のまま送信 → エラー表示
- tapOn:
    id: "login-submit-button"
- assertVisible: "メールアドレスを入力してください"

# メールのみ入力してパスワード短すぎエラー
- tapOn:
    id: "login-email-input"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- inputText: "test@example.com"
- tapOn:
    id: "login-password-input"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- inputText: "short"
- tapOn:
    id: "login-submit-button"
- assertVisible: "8文字以上"

# 新規登録リンクへの遷移確認
- tapOn:
    id: "login-register-link"
- assertVisible:
    text: "アカウントを作成"
