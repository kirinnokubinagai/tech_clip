# 認証フロー: ログイン
# clearState: true でアプリ起動後、onboarding → register 画面 → login リンク経由でログイン画面に遷移し、
# シードユーザーでログインしてホーム画面遷移を確認する
#
# tags: smoke, auth

appId: com.techclip.app
tags:
  - smoke
  - auth

env:
  TEST_EMAIL: ${TEST_EMAIL}
  TEST_PASSWORD: ${TEST_PASSWORD}

---

# アプリ起動（clearState: true）
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- waitForAnimationToEnd:
    timeout: 30000
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "90%, 93%"
      - waitForAnimationToEnd:
          timeout: 2000

# オンボーディング: 4ページ通過（next-button x3 → finish-button）
- tapOn:
    id: "next-button"
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "90%, 93%"
      - waitForAnimationToEnd:
          timeout: 2000
- tapOn:
    id: "next-button"
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "90%, 93%"
      - waitForAnimationToEnd:
          timeout: 2000
- tapOn:
    id: "next-button"
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "90%, 93%"
      - waitForAnimationToEnd:
          timeout: 2000
- tapOn:
    id: "finish-button"
- waitForAnimationToEnd:
    timeout: 3000

# hasAccount=false のため register 画面にリダイレクトされる
# register-login-link でログイン画面へ移動
- assertVisible:
    text: "アカウントを作成"
- takeScreenshot: screenshots/03-auth-login/00-register-screen
- tapOn:
    id: "register-login-link"
- waitForAnimationToEnd:
    timeout: 2000

# --- ログイン画面 ---
- assertVisible:
    text: "ログイン"
- assertVisible: "メールアドレス"
- takeScreenshot: screenshots/03-auth-login/01-login-screen

# メールアドレス入力
- tapOn:
    id: "login-email-input"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- inputText: ${TEST_EMAIL}

# パスワード入力
- tapOn:
    id: "login-password-input"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- inputText: ${TEST_PASSWORD}

# パスワード表示トグルの確認
- tapOn:
    id: "login-toggle-password"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- assertVisible: "隠す"
- tapOn:
    id: "login-toggle-password"
- assertVisible: "表示"

# キーボードを閉じてからログインボタンをタップ
- hideKeyboard
- tapOn:
    id: "login-submit-button"

# ホーム画面に遷移することを確認
- waitForAnimationToEnd:
    timeout: 8000
- assertVisible:
    text: "すべて"
- takeScreenshot: screenshots/03-auth-login/02-home-after-login

# --- バリデーションエラーのテスト（register 画面経由でログイン画面へ）---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- waitForAnimationToEnd:
    timeout: 30000
- runFlow:
    when:
      visible: "Process system isn't responding"
    commands:
      - tapOn: "Wait"
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "90%, 93%"
      - waitForAnimationToEnd:
          timeout: 2000
- tapOn:
    id: "next-button"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: "next-button"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: "next-button"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: "finish-button"
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    id: "register-login-link"
- waitForAnimationToEnd:
    timeout: 2000

# 空のまま送信 → エラー表示
- tapOn:
    id: "login-submit-button"
- assertVisible: "メールアドレスを入力してください。"

# メールのみ入力してパスワード短すぎエラー
- tapOn:
    id: "login-email-input"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- inputText: "test@example.com"
- tapOn:
    id: "login-password-input"
- runFlow:
    when:
      visible: "Try out your stylus"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 1000
- inputText: "short"
- hideKeyboard
- tapOn:
    id: "login-submit-button"
- assertVisible: "8文字以上"

# 新規登録リンクへの遷移確認
- tapOn:
    id: "login-register-link"
- assertVisible:
    text: "アカウントを作成"
